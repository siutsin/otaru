_shared:
  preferredPodAntiAffinity: &preferredPodAntiAffinity
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname

integrations:
  clusterSecretStore: true

external-secrets:
  affinity:
    <<: *preferredPodAntiAffinity
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
      ephemeral-storage: 64Mi
    limits:
      memory: 128Mi
      ephemeral-storage: 64Mi
  webhook:
    affinity:
      <<: *preferredPodAntiAffinity
  certController:
    affinity:
      <<: *preferredPodAntiAffinity
  global:
    affinity:
      <<: *preferredPodAntiAffinity
