name: cloudflare-tunnel
namespace: cloudflare-tunnel

image:
  repository: cloudflare/cloudflared
  tag: "2026.6.0@sha256:ba461b8aa9c042156dbd39c38657fe7431bafa063220eab8d5330a523863da9f"

replicaCount: 2

resources:
  requests:
    cpu: 10m
    memory: 128Mi
    ephemeral-storage: 64Mi
  limits:
    memory: 128Mi
    ephemeral-storage: 64Mi

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node.otaru.io/storage-tier
              operator: In
              values:
                - sd-card
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              pod: cloudflared
          topologyKey: kubernetes.io/hostname

tolerations:
  - key: node.otaru.io/storage-tier
    operator: Equal
    value: sd-card
    effect: PreferNoSchedule
