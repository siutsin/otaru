name: cloudflare-tunnel
namespace: cloudflare-tunnel

image:
  tag: "2026.3.0"

replicaCount: 2

resources:
  requests:
    cpu: 10m
    memory: 128Mi
  limits:
    memory: 128Mi

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: volume
              operator: NotIn
              values:
                - "true"
