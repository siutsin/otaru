name: cloudflare-tunnel
namespace: cloudflare-tunnel

image:
  repository: cloudflare/cloudflared
  tag: "2026.5.1@sha256:a5b5e6fd9a372f054b9a843c219bfbcdceb54691605312a8b1ee72978bdf1aa1"

replicaCount: 2

resources:
  requests:
    cpu: 10m
    memory: 128Mi
    ephemeral-storage: 64Mi
  limits:
    memory: 128Mi
    ephemeral-storage: 64Mi

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              pod: cloudflared
          topologyKey: kubernetes.io/hostname
