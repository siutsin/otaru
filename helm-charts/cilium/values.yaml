routes:
  hubbleUI:
    name: hubble-ui
    namespace: kube-system

cilium:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 128Mi
    limits:
      memory: 256Mi
      ephemeral-storage: 128Mi
  encryption:
    enabled: true
    type: wireguard
    nodeEncryption: true
    strictMode:
      enabled: true
      cidr: 10.42.0.0/16
      allowRemoteNodeIdentities: true
  externalIPs:
    enabled: true
  gatewayAPI:
    enabled: true
    enableAlpn: true
  hubble:
    relay:
      enabled: true
    ui:
      enabled: true
  ipam:
    operator:
      clusterPoolIPv4PodCIDRList: 10.42.0.0/16
  k8sClientRateLimit:
    qps: 50
    burst: 100
  k8sServiceHost: 127.0.0.1
  k8sServicePort: 6443
  kubeProxyReplacement: true
  l2announcements:
    enabled: true
    leaseDuration: 3s
    leaseRenewDeadline: 1s
    leaseRetryPeriod: 200ms
  operator:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
        ephemeral-storage: 64Mi
      limits:
        memory: 128Mi
        ephemeral-storage: 64Mi
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                io.cilium/app: operator
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: volume
                  operator: NotIn
                  values:
                    - "true"
