{{- $version := regexReplaceAll "@sha256:.*$" .Values.deployment.image.tag "" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/version: {{ $version | quote }}
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.name }}
        app.kubernetes.io/version: {{ $version | quote }}
    spec:
      {{- if .Values.deployment.affinity }}
      affinity: {{ toYaml .Values.deployment.affinity | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.name }}
          image: "{{ .Values.deployment.image.repository }}:{{ .Values.deployment.image.tag }}"
          # No runAsNonRoot here: the upstream image's s6-overlay init needs to run
          # as root (verified locally, it fails with "unable to setgid to root" and
          # "unable to mkdir /run/s6" as a non-root user). allowPrivilegeEscalation
          # and dropping capabilities are still safe on top of root, confirmed the
          # container still starts and serves HTTP.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            # https://www.home-assistant.io/installation/linux#optimizations
            - name: DISABLE_JEMALLOC
              value: "true"
          ports:
            - name: http
              containerPort: 8123
              protocol: TCP
            - name: coap
              containerPort: 5683
              protocol: UDP
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 60
            periodSeconds: 10
          volumeMounts:
            - mountPath: /config
              name: config
            - mountPath: /config/configuration.yaml
              name: configuration
              subPath: configuration.yaml
          resources:
            # KRR 2026-07-05: live peak ~275Mi working set; 500Mi request was ~1.8x actual usage.
            requests:
              cpu: "50m"
              memory: "320Mi"
              ephemeral-storage: "100Mi"
            limits:
              memory: "320Mi"
              ephemeral-storage: "100Mi"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: home-assistant-config-pvc
        - name: configuration
          configMap:
            name: configuration
