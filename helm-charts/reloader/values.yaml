reloader:
  reloader:
    deployment:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
          ephemeral-storage: 64Mi
        limits:
          cpu: ~
          memory: 64Mi
          ephemeral-storage: 64Mi
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: volume
                    operator: NotIn
                    values:
                      - "true"
