{{- if .Values.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name }}
  namespace: {{ .Values.namespace }}
  annotations:
    prometheus.io/port: "9153"
    prometheus.io/scrape: "true"
  labels:
    k8s-app: {{ .Values.labels.selector }}
    kubernetes.io/cluster-service: "true"
    kubernetes.io/name: CoreDNS
spec:
  type: ClusterIP
  clusterIP: {{ .Values.service.clusterIP }}
  selector:
    k8s-app: {{ .Values.labels.selector }}
  ports:
    - name: dns
      protocol: UDP
      port: 53
      targetPort: 53
    - name: dns-tcp
      protocol: TCP
      port: 53
      targetPort: 53
    - name: metrics
      protocol: TCP
      port: 9153
      targetPort: 9153
{{- end }}
