descheduler:
  kind: Deployment
  resources:
    # KRR 2026-07-05: live peak ~100Mi working set; 256Mi request was never approached.
    # KRR 2026-07-18: 14d peak ~10m CPU / ~100Mi memory (both GOOD, safe
    # downsize). KRR also flags the 500m CPU limit as unnecessary, but it is
    # inherited from the vendored chart's own default (this file never sets
    # it) and a plain values.yaml `null` does not remove a subchart-default
    # key on merge (confirmed via `helm template`) -- left as is rather than
    # fighting the chart with a hackier override.
    requests:
      cpu: 10m
      memory: 100Mi
      ephemeral-storage: 64Mi
    limits:
      memory: 100Mi
      ephemeral-storage: 64Mi
  deschedulerPolicy:
    profiles:
      - name: default
        pluginConfig:
          - name: DefaultEvictor
            args:
              podProtections:
                defaultDisabled:
                  - PodsWithLocalStorage
          - name: RemovePodsHavingTooManyRestarts
            args:
              podRestartThreshold: 100
              includingInitContainers: true
          # Added 2026-07-14: repave Deployment-owned pods every 2 days so
          # they periodically pick up node patches and don't accumulate
          # slow memory creep. Scoped to ReplicaSet-owned pods only (a
          # Deployment-managed pod's immediate ownerReference kind is
          # ReplicaSet, not Deployment) so CronJob/Job pods, StatefulSets
          # (CNPG, Longhorn), and DaemonSets are never touched by this.
          - name: PodLifeTime
            args:
              maxPodLifeTimeSeconds: 172800 # 2 days
              states:
                - Running
              ownerKinds:
                include:
                  - ReplicaSet
          - name: LowNodeUtilization
            args:
              thresholds:
                cpu: 20
                memory: 20
                pods: 20
              targetThresholds:
                cpu: 50
                memory: 50
                pods: 50
        plugins:
          balance:
            enabled:
              - LowNodeUtilization
          deschedule:
            enabled:
              - RemovePodsHavingTooManyRestarts
              - PodLifeTime
      # Added 2026-07-13: LowNodeUtilization is a no-op when every node sits
      # above its 50% targetThreshold at once (our steady state -- all 5
      # nodes run 83-97% memory requests), since it needs an already-
      # underutilized node to land evicted pods on. HighNodeUtilization
      # solves the actual problem this cluster hits: combined free memory
      # exists (~2-3GiB) but is spread too thin across all 5 nodes for a
      # single multi-container pod's request to fit anywhere (confirmed
      # live: teslamate-verify-pitr's 2Gi combined request failed to
      # schedule despite nuc-00 alone showing ~1GiB free). This
      # consolidates lightly-loaded nodes' pods onto busier ones, growing
      # contiguous free space on whichever node is currently least
      # utilized (usually nuc-00) instead of leaving slack scattered.
      # HighNodeUtilization and LowNodeUtilization cannot share one
      # profile (opposite goals), hence the separate profile here.
      - name: consolidate
        pluginConfig:
          - name: DefaultEvictor
            args:
              podProtections:
                defaultDisabled:
                  - PodsWithLocalStorage
              # 2026-07-20: blocky (DNS-critical) was repeatedly evicted from
              # raspberrypi-00 by this profile's HighNodeUtilization -- it was
              # the only node under the 90% memory threshold while the other
              # four sat at 98-100%, so the evicted pod had nowhere else to
              # fit and rescheduled straight back onto the same node, a
              # disruptive no-op loop every ~5 minutes. Tried opting blocky
              # out via the descheduler.alpha.kubernetes.io/evict: "false"
              # pod annotation first -- confirmed via descheduler v0.36
              # source that this annotation only checks presence, not value
              # (kubernetes-sigs/descheduler#1659), so it had no effect.
              # labelSelector is an allow-list (only matching pods are
              # eligible for eviction under this profile), so excluding
              # blocky here is the correct mechanism.
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: NotIn
                    values:
                      - blocky
          - name: HighNodeUtilization
            args:
              thresholds:
                cpu: 100
                memory: 90
                pods: 100
        plugins:
          balance:
            enabled:
              - HighNodeUtilization
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname
