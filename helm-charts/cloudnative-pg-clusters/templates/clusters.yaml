{{- range $k, $clusterConfig := .Values.clusters }}
---
# Cluster: {{ $clusterConfig.clusterName }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  # Cluster metadata with name, namespace, and optional annotations
  name: {{ $clusterConfig.clusterName }}
  namespace: {{ $clusterConfig.namespace }}
  {{- if $clusterConfig.annotations }}
  annotations: {{ toYaml $clusterConfig.annotations | nindent 4 }}
  {{- else if $.Values.defaults.cluster.annotations }}
  annotations: {{ toYaml $.Values.defaults.cluster.annotations | nindent 4 }}
  {{- end }}
  {{- if $clusterConfig.labels }}
  labels: {{ toYaml $clusterConfig.labels | nindent 4 }}
  {{- else if $.Values.defaults.cluster.labels }}
  labels: {{ toYaml $.Values.defaults.cluster.labels | nindent 4 }}
  {{- end }}

spec:
  {{- if $clusterConfig.affinity }}
  affinity: {{ toYaml $clusterConfig.affinity | nindent 4 }}
  {{- else if $.Values.defaults.cluster.affinity }}
  affinity: {{ toYaml $.Values.defaults.cluster.affinity | nindent 4 }}
  {{- end }}

  # PostgreSQL configuration
  {{- if $clusterConfig.postgresql }}
  postgresql: {{ toYaml $clusterConfig.postgresql | nindent 4 }}
  {{- else if $.Values.defaults.cluster.postgresql }}
  postgresql: {{ toYaml $.Values.defaults.cluster.postgresql | nindent 4 }}
  {{- end }}

  # Number of PostgreSQL instances to deploy
  instances: {{ $clusterConfig.instances | default $.Values.defaults.cluster.instances | default 1 }}

  # Storage configuration for the database
  {{- if $clusterConfig.storage }}
  storage: {{ toYaml $clusterConfig.storage | nindent 4 }}
  {{- else if $.Values.defaults.cluster.storage }}
  storage: {{ toYaml $.Values.defaults.cluster.storage | nindent 4 }}
  {{- end }}

  # Plugin configuration for backup and WAL archiving
  {{- if $clusterConfig.plugins }}
  plugins: {{ toYaml $clusterConfig.plugins | nindent 4 }}
  {{- else if $.Values.defaults.cluster.plugins }}
  plugins: {{ toYaml $.Values.defaults.cluster.plugins | nindent 4 }}
  {{- end }}

  # Backup configuration for the cluster
  {{- if $clusterConfig.backup }}
  backup: {{ toYaml $clusterConfig.backup | nindent 4 }}
  {{- else if $.Values.defaults.cluster.backup }}
  backup: {{ toYaml $.Values.defaults.cluster.backup | nindent 4 }}
  {{- end }}

  {{- if hasKey $clusterConfig "enablePDB" }}
  enablePDB: {{ $clusterConfig.enablePDB }}
  {{- else if hasKey $.Values.defaults.cluster "enablePDB" }}
  enablePDB: {{ $.Values.defaults.cluster.enablePDB }}
  {{- end }}

  # Enable superuser access for the postgres role
  {{- if hasKey $clusterConfig "enableSuperuserAccess" }}
  enableSuperuserAccess: {{ $clusterConfig.enableSuperuserAccess }}
  {{- end }}

  {{- if hasKey $clusterConfig "failoverDelay" }}
  failoverDelay: {{ $clusterConfig.failoverDelay }}
  {{- else if hasKey $.Values.defaults.cluster "failoverDelay" }}
  failoverDelay: {{ $.Values.defaults.cluster.failoverDelay }}
  {{- end }}

  {{- if $clusterConfig.imageName }}
  imageName: {{ $clusterConfig.imageName }}
  {{- else if $.Values.defaults.cluster.imageName }}
  imageName: {{ $.Values.defaults.cluster.imageName }}
  {{- end }}

  {{- if $clusterConfig.logLevel }}
  logLevel: {{ $clusterConfig.logLevel }}
  {{- else if $.Values.defaults.cluster.logLevel }}
  logLevel: {{ $.Values.defaults.cluster.logLevel }}
  {{- end }}

  # Managed resources like roles
  {{- if $clusterConfig.managed }}
  managed: {{ toYaml $clusterConfig.managed | nindent 4 }}
  {{- end }}

  {{- if hasKey $clusterConfig "maxSyncReplicas" }}
  maxSyncReplicas: {{ $clusterConfig.maxSyncReplicas }}
  {{- else if hasKey $.Values.defaults.cluster "maxSyncReplicas" }}
  maxSyncReplicas: {{ $.Values.defaults.cluster.maxSyncReplicas }}
  {{- end }}

  {{- if hasKey $clusterConfig "minSyncReplicas" }}
  minSyncReplicas: {{ $clusterConfig.minSyncReplicas }}
  {{- else if hasKey $.Values.defaults.cluster "minSyncReplicas" }}
  minSyncReplicas: {{ $.Values.defaults.cluster.minSyncReplicas }}
  {{- end }}

  {{- if $clusterConfig.monitoring }}
  monitoring: {{ toYaml $clusterConfig.monitoring | nindent 4 }}
  {{- else if $.Values.defaults.cluster.monitoring }}
  monitoring: {{ toYaml $.Values.defaults.cluster.monitoring | nindent 4 }}
  {{- end }}

  # Bootstrap configuration for initial database setup (optional)
  {{- if $clusterConfig.bootstrap }}
  bootstrap: {{ toYaml $clusterConfig.bootstrap | nindent 4 }}
  {{- else if $.Values.defaults.cluster.bootstrap }}
  bootstrap: {{ toYaml $.Values.defaults.cluster.bootstrap | nindent 4 }}
  {{- end }}

  # External clusters configuration for recovery scenarios
  {{- if $clusterConfig.externalClusters }}
  externalClusters: {{ toYaml $clusterConfig.externalClusters | nindent 4 }}
  {{- end }}

  {{- if hasKey $clusterConfig "postgresGID" }}
  postgresGID: {{ $clusterConfig.postgresGID }}
  {{- else if hasKey $.Values.defaults.cluster "postgresGID" }}
  postgresGID: {{ $.Values.defaults.cluster.postgresGID }}
  {{- end }}

  {{- if hasKey $clusterConfig "postgresUID" }}
  postgresUID: {{ $clusterConfig.postgresUID }}
  {{- else if hasKey $.Values.defaults.cluster "postgresUID" }}
  postgresUID: {{ $.Values.defaults.cluster.postgresUID }}
  {{- end }}

  {{- if $clusterConfig.primaryUpdateMethod }}
  primaryUpdateMethod: {{ $clusterConfig.primaryUpdateMethod }}
  {{- else if $.Values.defaults.cluster.primaryUpdateMethod }}
  primaryUpdateMethod: {{ $.Values.defaults.cluster.primaryUpdateMethod }}
  {{- end }}

  {{- if $clusterConfig.primaryUpdateStrategy }}
  primaryUpdateStrategy: {{ $clusterConfig.primaryUpdateStrategy }}
  {{- else if $.Values.defaults.cluster.primaryUpdateStrategy }}
  primaryUpdateStrategy: {{ $.Values.defaults.cluster.primaryUpdateStrategy }}
  {{- end }}

  {{- if $clusterConfig.replicationSlots }}
  replicationSlots: {{ toYaml $clusterConfig.replicationSlots | nindent 4 }}
  {{- else if $.Values.defaults.cluster.replicationSlots }}
  replicationSlots: {{ toYaml $.Values.defaults.cluster.replicationSlots | nindent 4 }}
  {{- end }}

  {{- if hasKey $clusterConfig "smartShutdownTimeout" }}
  smartShutdownTimeout: {{ $clusterConfig.smartShutdownTimeout }}
  {{- else if hasKey $.Values.defaults.cluster "smartShutdownTimeout" }}
  smartShutdownTimeout: {{ $.Values.defaults.cluster.smartShutdownTimeout }}
  {{- end }}

  {{- if hasKey $clusterConfig "startDelay" }}
  startDelay: {{ $clusterConfig.startDelay }}
  {{- else if hasKey $.Values.defaults.cluster "startDelay" }}
  startDelay: {{ $.Values.defaults.cluster.startDelay }}
  {{- end }}

  {{- if hasKey $clusterConfig "stopDelay" }}
  stopDelay: {{ $clusterConfig.stopDelay }}
  {{- else if hasKey $.Values.defaults.cluster "stopDelay" }}
  stopDelay: {{ $.Values.defaults.cluster.stopDelay }}
  {{- end }}

  {{- if hasKey $clusterConfig "switchoverDelay" }}
  switchoverDelay: {{ $clusterConfig.switchoverDelay }}
  {{- else if hasKey $.Values.defaults.cluster "switchoverDelay" }}
  switchoverDelay: {{ $.Values.defaults.cluster.switchoverDelay }}
  {{- end }}

{{- end }}
