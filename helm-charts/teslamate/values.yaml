name: teslamate
namespace: teslamate
database:
  host: teslamate-20260412-0619-rw.teslamate
  name: app
  port: "5432"
  appSecretName: &databaseAppSecretName teslamate-20260412-0619-app

deployment:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node.siutsin.com/storage-tier
                operator: NotIn
                values:
                  - sd-card
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: teslamate
            topologyKey: kubernetes.io/hostname
  image:
    repository: teslamate/teslamate
    tag: 4.0.0@sha256:1c4f03e1c8a8e43269ac24c78a2f4a4a021637bbedf600d4b951ec1223889a4e
  envFrom:
    - secretRef:
        name: teslamate
  env:
    - name: DISABLE_MQTT
      value: "true"
    - name: TZ
      value: Europe/London
    - name: LOCALE
      value: en
    - name: DATABASE_HOST
      value: &databaseHost teslamate-20260412-0619-rw.teslamate
    - name: DATABASE_NAME
      value: &databaseName app
    - name: DATABASE_PORT
      value: &databasePort "5432"
    - name: DATABASE_USER
      valueFrom:
        secretKeyRef:
          name: *databaseAppSecretName
          key: username
    - name: DATABASE_PASS
      valueFrom:
        secretKeyRef:
          name: *databaseAppSecretName
          key: password

service:
  containerPort: 4000
  port: 4000

grafana:
  resources:
    # Keep memory at 512Mi: TeslaMate dashboard usage pushed Grafana against the 128Mi limit and caused OOMKills.
    requests:
      cpu: 50m
      memory: 512Mi
      ephemeral-storage: 128Mi
    limits:
      memory: 512Mi
      ephemeral-storage: 128Mi
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node.siutsin.com/storage-tier
                operator: NotIn
                values:
                  - sd-card
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/instance: teslamate
                app.kubernetes.io/name: grafana
            topologyKey: kubernetes.io/hostname
  annotations:
    reloader.stakater.com/auto: "true"
  readinessProbe:
    httpGet:
      path: /api/health
      port: grafana
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 6
  livenessProbe:
    httpGet:
      path: /api/health
      port: grafana
    initialDelaySeconds: 180
    periodSeconds: 10
    timeoutSeconds: 30
    failureThreshold: 10
  image:
    repository: teslamate/grafana
    tag: 4.0.0@sha256:5b974c82b7684fbe071778e5e5e5f542dc9caffc2cacafb750edf8bf92124beb
  database:
    secretName: *databaseAppSecretName
  envValueFrom:
    DATABASE_HOST:
      secretKeyRef:
        name: *databaseAppSecretName
        key: host
    DATABASE_NAME:
      secretKeyRef:
        name: *databaseAppSecretName
        key: dbname
    DATABASE_USER:
      secretKeyRef:
        name: *databaseAppSecretName
        key: username
    DATABASE_PASS:
      secretKeyRef:
        name: *databaseAppSecretName
        key: password
  admin:
    existingSecret: teslamate-grafana

backup:
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
      ephemeral-storage: 2Gi
    limits:
      memory: 256Mi
      ephemeral-storage: 2Gi
  schedule: "0 10 * * *"
  verify:
    schedule: "0 12 * * *"
    verificationQuery: "SELECT count(*) FROM positions;"
  verifyPitr:
    schedule: "0 14 * * *"
    activeDeadlineSeconds: 28800 # 8 hours
    timeoutSeconds: 21600 # 6 hours
    verificationQuery: "SELECT count(*) FROM positions;"
    restore:
      storage:
        size: 5Gi
        storageClass: longhorn-crypto-global
  ttlSecondsAfterFinished: 600 # 10 minutes
  backoffLimit: 4
  concurrencyPolicy: Forbid
  database:
    imageName: ghcr.io/cloudnative-pg/postgresql:17.4
    secretName: *databaseAppSecretName
    postgresVersion: "17"
