name: teslamate
namespace: teslamate
database:
  host: teslamate-20260412-0619-rw.teslamate
  name: app
  port: "5432"
  appSecretName: &databaseAppSecretName teslamate-20260412-0619-app

deployment:
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: teslamate
            topologyKey: kubernetes.io/hostname
  image:
    # Pull from GHCR (ghcr.io/teslamate-org/teslamate), not Docker Hub.
    # Temporary hotfix for Tesla Owner API 403 after v4.0.0 (teslamate-org/teslamate#5399).
    # main@6a9a33b includes merged PR #5406 (TLS 1.3 + HTTP/2 for auth.tesla.com).
    # Pin to a stable GHCR release tag once 4.0.1+ is published.
    repository: ghcr.io/teslamate-org/teslamate
    tag: main@sha256:822478f8f85c2b0e305845e23316c91fade38fc5a1ab193d6558e95daead9d05
  envFrom:
    - secretRef:
        name: teslamate
  env:
    - name: DISABLE_MQTT
      value: "true"
    - name: TZ
      value: Europe/London
    - name: LOCALE
      value: en
    - name: DATABASE_HOST
      value: &databaseHost teslamate-20260412-0619-rw.teslamate
    - name: DATABASE_NAME
      value: &databaseName app
    - name: DATABASE_PORT
      value: &databasePort "5432"
    - name: DATABASE_USER
      valueFrom:
        secretKeyRef:
          name: *databaseAppSecretName
          key: username
    - name: DATABASE_PASS
      valueFrom:
        secretKeyRef:
          name: *databaseAppSecretName
          key: password

service:
  containerPort: 4000
  port: 4000

grafana:
  testFramework:
    # Helm test hooks are not run under Argo CD and leave orphaned resources that degrade app health.
    enabled: false
  resources:
    # Keep memory at 512Mi: TeslaMate dashboard usage pushed Grafana against the 128Mi limit and caused OOMKills.
    requests:
      cpu: 50m
      memory: 512Mi
      ephemeral-storage: 128Mi
    limits:
      memory: 512Mi
      ephemeral-storage: 128Mi
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/instance: teslamate
                app.kubernetes.io/name: grafana
            topologyKey: kubernetes.io/hostname
  annotations:
    reloader.stakater.com/auto: "true"
  readinessProbe:
    httpGet:
      path: /api/health
      port: grafana
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 6
  livenessProbe:
    httpGet:
      path: /api/health
      port: grafana
    initialDelaySeconds: 180
    periodSeconds: 10
    timeoutSeconds: 30
    failureThreshold: 10
  image:
    registry: ghcr.io
    repository: teslamate-org/teslamate/grafana
    tag: main@sha256:75a5600ce7bf9cd4b7f79ffea3e253a698aaf263fb53a1b0061a428619267d3e
  database:
    secretName: *databaseAppSecretName
  envValueFrom:
    DATABASE_HOST:
      secretKeyRef:
        name: *databaseAppSecretName
        key: host
    DATABASE_NAME:
      secretKeyRef:
        name: *databaseAppSecretName
        key: dbname
    DATABASE_USER:
      secretKeyRef:
        name: *databaseAppSecretName
        key: username
    DATABASE_PASS:
      secretKeyRef:
        name: *databaseAppSecretName
        key: password
  admin:
    existingSecret: teslamate-grafana

backup:
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
      ephemeral-storage: 2Gi
    limits:
      memory: 256Mi
      ephemeral-storage: 2Gi
  schedule: "0 10 * * *"
  verify:
    schedule: "0 12 * * *"
    verificationQuery: "SELECT count(*) FROM positions;"
  verifyPitr:
    schedule: "0 14 * * *"
    activeDeadlineSeconds: 28800 # 8 hours
    timeoutSeconds: 21600 # 6 hours
    verificationQuery: "SELECT count(*) FROM positions;"
    restore:
      storage:
        size: 5Gi
        storageClass: longhorn-crypto-global
  ttlSecondsAfterFinished: 600 # 10 minutes
  backoffLimit: 4
  concurrencyPolicy: Forbid
  database:
    imageName: ghcr.io/cloudnative-pg/postgresql:17.4
    secretName: *databaseAppSecretName
    postgresVersion: "17"
