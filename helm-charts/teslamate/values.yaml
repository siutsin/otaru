name: teslamate
namespace: teslamate

deployment:
  image:
    repository: teslamate/teslamate
    tag: 3.0.0@sha256:6569026b73bd657455bbec05965d07fa30b6d4d70eaab0bd5b343231c0429167
  env:
    - name: DISABLE_MQTT
      value: "true"
    - name: TZ
      value: Europe/London
    - name: LOCALE
      value: en
  envFrom:
    - secretRef:
        name: teslamate
    - secretRef:
        name: &databaseSecretName teslamate-20251024-0015

service:
  containerPort: 4000
  port: 4000

grafana:
  annotations:
    reloader.stakater.com/auto: "true"
  image:
    repository: teslamate/grafana
    tag: 3.0.0@sha256:e02d1f036dd10771ea04db2bafc483067a9dbb874d0b5137dda5a6fe539b77dc
  envFromSecret: *databaseSecretName
  admin:
    existingSecret: teslamate-grafana

backup:
  schedule: "0 10 * * *"
  verify:
    schedule: "0 12 * * *"
    verificationQuery: "SELECT count(*) FROM positions;"
  ttlSecondsAfterFinished: 86400 # 1 day
  backoffLimit: 4
  concurrencyPolicy: Forbid
  database:
    secretName: teslamate-20251024-0015
    postgresVersion: "17"

