namespace: argocd

argo-cd:
  _shared:
    controllerResources: &controllerResources
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        memory: 512Mi
    componentResources: &componentResources
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 256Mi
    redisResources: &redisResources
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 128Mi
    readinessProbe: &readinessProbe
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    livenessProbe: &livenessProbe
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
    singletonPdb: &singletonPdb
      enabled: true
      minAvailable: 1
    haPdb: &haPdb
      enabled: true
      maxUnavailable: 1
  global:
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: volume
                  operator: NotIn
                  values:
                    - "true"
  configs:
    cm:
      url: https://argocd.internal.siutsin.com/argocd/
    params:
      server.insecure: true
      server.basehref: /argocd/
      server.rootpath: /argocd
    cmp:
      create: true
      plugins:
        jsonnet-with-secret:
          discover:
            fileName: manifest.jsonnet
          generate:
            command:
              - jsonnet
            args:
              - --yaml-stream
              - manifest.jsonnet
              - --ext-str
              - AWS_ACCOUNT_ID
              - --ext-str
              - CNPG_BACKUP_BUCKET
              - --ext-str
              - CNPG_BACKUP_ENDPOINT
              - --ext-str
              - LONGHORN_BACKUP_TARGET
              - --ext-str
              - HOME_ASSISTANT_VOLUME_FROM_BACKUP
              - --ext-str
              - YAADE_VOLUME_FROM_BACKUP
  dex:
    enabled: false
  notifications:
    enabled: false
  controller:
    replicas: 3
    resources: *controllerResources
    readinessProbe: *readinessProbe
    pdb: *haPdb
  server:
    autoscaling:
      enabled: true
      minReplicas: 2
    resources: *componentResources
    readinessProbe: *readinessProbe
    livenessProbe: *livenessProbe
    pdb: *haPdb
  applicationSet:
    resources: *componentResources
    readinessProbe:
      <<: *readinessProbe
      enabled: true
    livenessProbe:
      <<: *livenessProbe
      enabled: true
    pdb: *singletonPdb
  redis:
    resources: *redisResources
    pdb: *singletonPdb
  repoServer:
    autoscaling:
      enabled: true
      minReplicas: 3
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
        ephemeral-storage: 1Gi
      limits:
        memory: 1Gi
        ephemeral-storage: 4Gi
    readinessProbe:
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    livenessProbe:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
    pdb: *haPdb
    containerSecurityContext:
      runAsUser: 999
    rbac:
      - apiGroups:
          - ""
        resources:
          - secrets
        verbs:
          - get
        resourceNames:
          - argocd-jsonnet-secret
    initContainers:
      - name: wait-for-secret
        image: alpine/kubectl:1.35.2@sha256:ec8f734b0a103ae63b5c008b99477f240f4109a8449c2f4947aa231e69b11745
        command:
          - /bin/sh
          - -c
          - |
            echo "Waiting for secret argocd-jsonnet-secret..."
            until kubectl get secret argocd-jsonnet-secret -n argocd; do
              echo "Secret not found, retrying in 5 seconds..."
              sleep 5
            done
            echo "Secret argocd-jsonnet-secret found!"
        securityContext:
          runAsUser: 1000
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 64Mi
    extraContainers:
      - name: jsonnet-with-secret
        env:
          - name: AWS_ACCOUNT_ID
            valueFrom:
              secretKeyRef:
                name: argocd-jsonnet-secret
                key: AWS_ACCOUNT_ID
          - name: CNPG_BACKUP_BUCKET
            valueFrom:
              secretKeyRef:
                name: argocd-jsonnet-secret
                key: CNPG_BACKUP_BUCKET
          - name: CNPG_BACKUP_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: argocd-jsonnet-secret
                key: CNPG_BACKUP_ENDPOINT
          - name: LONGHORN_BACKUP_TARGET
            valueFrom:
              secretKeyRef:
                name: argocd-jsonnet-secret
                key: LONGHORN_BACKUP_TARGET
          - name: HOME_ASSISTANT_VOLUME_FROM_BACKUP
            valueFrom:
              secretKeyRef:
                name: argocd-jsonnet-secret
                key: HOME_ASSISTANT_VOLUME_FROM_BACKUP
          - name: YAADE_VOLUME_FROM_BACKUP
            valueFrom:
              secretKeyRef:
                name: argocd-jsonnet-secret
                key: YAADE_VOLUME_FROM_BACKUP
        command:
          - /var/run/argocd/argocd-cmp-server
        securityContext:
          runAsNonRoot: true
          runAsUser: 999
        image: ghcr.io/siutsin/images/go-jsonnet:v0.22.0-rc1-202603220524@sha256:5261f61f4f94b17cfb92ddcf7518c36a909366657a8cfff16a91d7b277a19de8
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
            ephemeral-storage: 256Mi
          limits:
            memory: 256Mi
            ephemeral-storage: 1Gi
        volumeMounts:
          - mountPath: /var/run/argocd
            name: var-files
          - mountPath: /home/argocd/cmp-server/plugins
            name: plugins
          - mountPath: /home/argocd/cmp-server/config/plugin.yaml
            subPath: jsonnet-with-secret.yaml
            name: argocd-cmp-cm
          - mountPath: /tmp
            name: cmp-tmp
    volumes:
      - name: argocd-cmp-cm
        configMap:
          name: argocd-cmp-cm
      - name: cmp-tmp
        emptyDir: {}
