namespace: argocd
integrations:
  externalSecrets: true

argo-cd:
  global:
    addPrometheusAnnotations: true
  _shared:
    controllerResources: &controllerResources
      # Keep memory at 2Gi: sync spikes can queue many repo comparisons at once,
      # and Argo CD tends to concentrate that work in a single controller pod, so
      # extra replicas do not materially reduce peak memory on the active pod.
      requests:
        cpu: 250m
        memory: 2Gi
        ephemeral-storage: 256Mi
      limits:
        memory: 2Gi
        ephemeral-storage: 256Mi
    componentResources: &componentResources
      requests:
        cpu: 100m
        memory: 128Mi
        ephemeral-storage: 128Mi
      limits:
        memory: 128Mi
        ephemeral-storage: 128Mi
    redisResources: &redisResources
      requests:
        cpu: 50m
        memory: 128Mi
        ephemeral-storage: 64Mi
      limits:
        memory: 128Mi
        ephemeral-storage: 64Mi
    readinessProbe: &readinessProbe
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    livenessProbe: &livenessProbe
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
    singletonPdb: &singletonPdb
      enabled: true
      minAvailable: 1
    haPdb: &haPdb
      enabled: true
      maxUnavailable: 1
  configs:
    cm:
      url: https://argocd.internal.siutsin.com/argocd/
    secret:
      createSecret: false
    params:
      # Keep repo-server concurrency bounded; Helm renders can spike memory during cold-cache bursts.
      reposerver.parallelism.limit: 2
      # Allow cold-cache manifest generation queues to drain before controllers mark comparison as Unknown.
      controller.repo.server.timeout.seconds: 180
      # Ambient HBONE encrypts east-west traffic; app-layer TLS on repo-server:8081 conflicts
      # with waypoint interception and caused handshake EOF when argocd-repo-server-tls existed.
      reposerver.disable.tls: true
      controller.repo.server.plaintext: true
      server.repo.server.plaintext: true
      applicationsetcontroller.repo.server.plaintext: true
      server.repo.server.timeout.seconds: 180
      applicationsetcontroller.repo.server.timeout.seconds: 180
      server.insecure: true
      server.basehref: /argocd/
      server.rootpath: /argocd
    cmp:
      create: true
      plugins:
        jsonnet-with-secret:
          discover:
            fileName: manifest.jsonnet
          generate:
            command:
              - jsonnet
            args:
              - --yaml-stream
              - manifest.jsonnet
              - --ext-str
              - AWS_ACCOUNT_ID
              - --ext-str
              - CNPG_BACKUP_BUCKET
              - --ext-str
              - CNPG_BACKUP_ENDPOINT
              - --ext-str
              - LONGHORN_BACKUP_TARGET
              - --ext-str
              - HOME_ASSISTANT_VOLUME_FROM_BACKUP
              - --ext-str
              - OPENCLAW_CONTROL_UI_HOSTNAME
  dex:
    enabled: false
  notifications:
    enabled: false
  controller:
    replicas: 1
    metrics:
      enabled: true
    resources: *controllerResources
    readinessProbe: *readinessProbe
    pdb: *singletonPdb
  server:
    metrics:
      enabled: true
    autoscaling:
      enabled: true
      minReplicas: 2
    resources: *componentResources
    readinessProbe: *readinessProbe
    livenessProbe: *livenessProbe
    pdb: *haPdb
  applicationSet:
    metrics:
      enabled: true
    resources: *componentResources
    readinessProbe:
      <<: *readinessProbe
      enabled: true
    livenessProbe:
      <<: *livenessProbe
      enabled: true
    pdb: *singletonPdb
  redis:
    resources: *redisResources
    pdb: *singletonPdb
    secretInit:
      enabled: false
  repoServer:
    metrics:
      enabled: true
    replicas: 1
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      metrics:
        - type: Resource
          resource:
            name: memory
            target:
              type: Utilization
              averageUtilization: 80
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 60
    # KRR 2026-07-12: 14d peak 380Mi against a 768Mi request/limit (WARNING,
    # ~2x headroom). Downsized to 512Mi, keeping ~35% margin over peak given
    # the cold-cache render spikes noted on reposerver.parallelism.limit
    # above. CPU was deferred at the time: KRR wanted ~1.7 cores against the
    # current 250m (CRITICAL), but this pod was still forced onto arm64 by a
    # mispinned digest, and all 4 arm64 nodes sat at 63-69% CPU requests.
    # KRR 2026-07-18: PR #2842 removed the arm64 nodeSelector (mispinned
    # digest fixed). nuc-00 (amd64, now a valid target) sits at 47% CPU
    # requests (2115m free of 4000m) and already hosts this pod, so applying
    # the 1678m recommendation now: RollingUpdate surge peaks at ~3563m/4000m
    # (89%) on nuc-00, well within capacity.
    # KRR 2026-07-18 hotfix: the 1678m request above stopped fitting anywhere
    # within a couple of hours -- nuc-00's free CPU had dropped to ~363m by
    # the time the rollout retried (other workloads' requests grew after
    # this pass), leaving the new pod Pending on all 5 nodes for 80+ minutes
    # (FailedScheduling: insufficient cpu). Reduced to 700m, which fits with
    # margin on raspberrypi-00/01/03 (~800-965m free each) -- still a large
    # improvement over the original 250m, just not the full KRR peak.
    resources:
      requests:
        cpu: 700m
        memory: 512Mi
        ephemeral-storage: 512Mi
      limits:
        memory: 512Mi
        ephemeral-storage: 512Mi
    readinessProbe:
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    livenessProbe:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
    pdb: *singletonPdb
    containerSecurityContext:
      runAsUser: 999
    rbac:
      - apiGroups:
          - ""
        resources:
          - secrets
        verbs:
          - get
        resourceNames:
          - argocd-jsonnet-secret
    initContainers:
      - name: wait-for-secret
        image: alpine/kubectl:1.36.2@sha256:9b053116c5c9b746e466230ea3b8bd381757064ee483e236dbadcf7f798f73cf
        command:
          - /bin/sh
          - -c
          - |
            echo "Waiting for secret argocd-jsonnet-secret..."
            until kubectl get secret argocd-jsonnet-secret -n argocd; do
              echo "Secret not found, retrying in 5 seconds..."
              sleep 5
            done
            echo "Secret argocd-jsonnet-secret found!"
        securityContext:
          runAsUser: 1000
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
            ephemeral-storage: 64Mi
          limits:
            memory: 64Mi
            ephemeral-storage: 64Mi
    extraContainers:
      - name: jsonnet-with-secret
        env:
          - name: AWS_ACCOUNT_ID
            valueFrom:
              secretKeyRef:
                name: argocd-jsonnet-secret
                key: AWS_ACCOUNT_ID
          - name: CNPG_BACKUP_BUCKET
            valueFrom:
              secretKeyRef:
                name: argocd-jsonnet-secret
                key: CNPG_BACKUP_BUCKET
          - name: CNPG_BACKUP_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: argocd-jsonnet-secret
                key: CNPG_BACKUP_ENDPOINT
          - name: LONGHORN_BACKUP_TARGET
            valueFrom:
              secretKeyRef:
                name: argocd-jsonnet-secret
                key: LONGHORN_BACKUP_TARGET
          - name: HOME_ASSISTANT_VOLUME_FROM_BACKUP
            valueFrom:
              secretKeyRef:
                name: argocd-jsonnet-secret
                key: HOME_ASSISTANT_VOLUME_FROM_BACKUP
          - name: OPENCLAW_CONTROL_UI_HOSTNAME
            valueFrom:
              secretKeyRef:
                name: argocd-jsonnet-secret
                key: OPENCLAW_CONTROL_UI_HOSTNAME
        command:
          - /var/run/argocd/argocd-cmp-server
        securityContext:
          runAsNonRoot: true
          runAsUser: 999
        image: ghcr.io/siutsin/images/go-jsonnet:v0.22.0-rc1-202603220524@sha256:7ae80ae8875c82a2bbb239ad476146188435eea0c46d6ee5f55a32b84221ce7f
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
            # ephemeral-storage 2026-07-06: 14d pod peak ~286Mi exceeded the 256Mi limit (96.6% via ephemeral_storage_container_limit_percentage) — bump to 512Mi for headroom.
            ephemeral-storage: 512Mi
          limits:
            memory: 128Mi
            ephemeral-storage: 512Mi
        volumeMounts:
          - mountPath: /var/run/argocd
            name: var-files
          - mountPath: /home/argocd/cmp-server/plugins
            name: plugins
          - mountPath: /home/argocd/cmp-server/config/plugin.yaml
            subPath: jsonnet-with-secret.yaml
            name: argocd-cmp-cm
          - mountPath: /tmp
            name: cmp-tmp
    volumes:
      - name: argocd-cmp-cm
        configMap:
          name: argocd-cmp-cm
      - name: cmp-tmp
        emptyDir: {}
