name: umami
namespace: umami

image:
  repository: ghcr.io/umami-software/umami
  tag: postgresql-latest@sha256:8edfe4beaef13f9d1300619fa264ef250a3688df9cc54d24ca830ca31cb475ec
  pullPolicy: IfNotPresent

database:
  secretName: umami-20260614-0001
  caSecretName: umami-20260614-0001-ca

appSecret:
  externalSecret:
    refreshInterval: 24h
    secretStoreRef:
      kind: ClusterSecretStore
      name: onepassword-secret-store
    remoteRef:
      key: Umami
      property: APP_SECRET

service:
  port: 3000
  targetPort: 3000

deployment:
  replicas: 1
  resources:
    # KRR 2026-07-05: live peak ~340Mi working set; 256Mi request left ~84Mi headroom.
    # KRR 2026-07-18: CPU WARNING, 14d peak needs ~359m against the 50m
    # request; memory peak dropped to ~313Mi (GOOD), so downsized to match.
    # raspberrypi-01 (its current node, 81% CPU requests, 725m free) has
    # room for the RollingUpdate surge.
    requests:
      cpu: 359m
      memory: 320Mi
      ephemeral-storage: 256Mi
    limits:
      memory: 320Mi
      ephemeral-storage: 256Mi

routes:
  collect:
    hostname: analytics.siutsin.com

gateway:
  name: gateway
  namespace: gateway

env:
  TZ: Europe/London
