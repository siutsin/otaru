{{- $version := regexReplaceAll "@sha256:.*$" .Values.app.image.tag "" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/version: {{ $version | quote }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.name }}
        app.kubernetes.io/version: {{ $version | quote }}
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: "app.kubernetes.io/name"
                      operator: In
                      values:
                        - {{ .Values.name }}
                topologyKey: "kubernetes.io/hostname"
      automountServiceAccountToken: false
      containers:
        - name: {{ .Values.name }}
          image: {{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}
          securityContext:
            runAsNonRoot: true
            # kong/httpbin's "httpbin" user is named, not numeric, in the image
            # metadata, so kubelet cannot verify runAsNonRoot without an explicit
            # numeric UID (CreateContainerConfigError otherwise). Confirmed via
            # `kubectl exec ... -- id`: uid=10001(httpbin) gid=10001(httpbin).
            runAsUser: 10001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              # kong/httpbin's python3 binary carries a cap_net_bind_service file
              # capability so its non-root "httpbin" user can bind port 80; verified
              # locally that dropping this too breaks exec with "operation not
              # permitted".
              add:
                - NET_BIND_SERVICE
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "0.1"
              memory: "100Mi"
              ephemeral-storage: "100Mi"
            limits:
              memory: "100Mi"
              ephemeral-storage: "100Mi"
