apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.name }}
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: {{ .Values.name }}
                topologyKey: kubernetes.io/hostname
      automountServiceAccountToken: false
      containers:
        - name: {{ .Values.name }}
          image: {{ .Values.deployment.image.repository }}:{{ .Values.deployment.image.tag }}
          imagePullPolicy: {{ .Values.deployment.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              python - <<'PY' > /tmp/changedetection-env.sh
              import shlex
              from pathlib import Path
              import yaml

              config = yaml.safe_load(Path("/etc/changedetection/config.yml").read_text()) or {}
              if not isinstance(config, dict):
                  raise SystemExit("changedetection config.yml must be a YAML mapping of environment variables")

              for key, value in config.items():
                  if isinstance(value, (dict, list)):
                      raise SystemExit(f"changedetection config.yml value for {key!r} must be scalar, got {type(value).__name__}")
                  if isinstance(value, bool):
                      rendered = "true" if value else "false"
                  elif value is None:
                      rendered = ""
                  else:
                      rendered = str(value)
                  print(f"export {key}={shlex.quote(rendered)}")
              PY
              . /tmp/changedetection-env.sh
              exec /docker-entrypoint.sh python ./changedetection.py -d {{ .Values.persistence.mountPath | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          resources: {{ toYaml .Values.deployment.resources | nindent 12 }}
          volumeMounts:
            - name: datastore
              mountPath: {{ .Values.persistence.mountPath }}
            - name: {{ .Values.name }}-config
              mountPath: /etc/changedetection/config.yml
              subPath: config.yml
      volumes:
        - name: datastore
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.claimName }}
        - name: {{ .Values.name }}-config
          secret:
            secretName: {{ .Values.name }}-config
