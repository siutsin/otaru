apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.browser.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.browser.name }}
    app.kubernetes.io/part-of: {{ .Values.name }}
spec:
  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.browser.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.browser.name }}
        app.kubernetes.io/part-of: {{ .Values.name }}
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node.siutsin.com/storage-tier
                    operator: NotIn
                    values:
                      - sd-card
      automountServiceAccountToken: false
      securityContext:
        fsGroup: {{ .Values.browser.profile.fsGroup }}
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: cleanup-browser-metrics
          image: {{ .Values.browser.cleanup.image.repository }}:{{ .Values.browser.cleanup.image.tag }}
          imagePullPolicy: {{ .Values.browser.cleanup.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              profile_dir={{ printf "%s/chromium" .Values.browser.profile.mountPath | quote }}
              metrics_dir={{ printf "%s/chromium/DeferredBrowserMetrics" .Values.browser.profile.mountPath | quote }}
              rm -f "$profile_dir"/SingletonCookie "$profile_dir"/SingletonLock "$profile_dir"/SingletonSocket
              if [ -d "$metrics_dir" ]; then
                find "$metrics_dir" -type f -name '*.pma' -delete
              fi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsUser: {{ .Values.browser.profile.fsGroup }}
            runAsGroup: {{ .Values.browser.profile.fsGroup }}
            runAsNonRoot: true
          resources: {{ toYaml .Values.browser.cleanup.resources | nindent 12 }}
          volumeMounts:
            - name: profile
              mountPath: {{ .Values.browser.profile.mountPath }}
      containers:
        - name: {{ .Values.browser.name }}
          image: {{ .Values.browser.image.repository }}@{{ .Values.browser.image.digest }}
          imagePullPolicy: {{ .Values.browser.image.pullPolicy }}
          env:
            {{- range $name, $value := .Values.browser.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: cdp
              containerPort: {{ .Values.browser.port }}
              protocol: TCP
            - name: stats
              containerPort: {{ .Values.browser.statsPort }}
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - python3
                - /usr/src/app/docker-health-check.py
                - --host
                - http://localhost
          readinessProbe:
            exec:
              command:
                - python3
                - /usr/src/app/docker-health-check.py
                - --host
                - http://localhost
          startupProbe:
            exec:
              command:
                - python3
                - /usr/src/app/docker-health-check.py
                - --host
                - http://localhost
            failureThreshold: 30
            periodSeconds: 10
          resources: {{ toYaml .Values.browser.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: profile
              mountPath: {{ .Values.browser.profile.mountPath }}
        - name: cleanup-browser-metrics-loop
          image: {{ .Values.browser.cleanup.image.repository }}:{{ .Values.browser.cleanup.image.tag }}
          imagePullPolicy: {{ .Values.browser.cleanup.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              metrics_dir={{ printf "%s/chromium/DeferredBrowserMetrics" .Values.browser.profile.mountPath | quote }}
              while true; do
                if [ -d "$metrics_dir" ]; then
                  find "$metrics_dir" -type f -name '*.pma' -mmin +{{ .Values.browser.cleanup.minAgeMinutes }} -delete
                fi
                sleep {{ .Values.browser.cleanup.intervalSeconds }}
              done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsUser: {{ .Values.browser.profile.fsGroup }}
            runAsGroup: {{ .Values.browser.profile.fsGroup }}
            runAsNonRoot: true
          resources: {{ toYaml .Values.browser.cleanup.resources | nindent 12 }}
          volumeMounts:
            - name: profile
              mountPath: {{ .Values.browser.profile.mountPath }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.browser.tmpSizeLimit }}
        - name: profile
          persistentVolumeClaim:
            claimName: {{ .Values.browser.profile.claimName }}
