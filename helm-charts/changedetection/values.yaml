name: changedetection
namespace: changedetection

onepassword:
  key: changedetection
  property: config.yaml

deployment:
  env:
    ALLOW_IANA_RESTRICTED_ADDRESSES: "true"
    DISABLE_VERSION_CHECK: "true"
    FETCH_WORKERS: "1"
    HIDE_REFERER: "true"
    LANG: C.UTF-8
    LC_ALL: C.UTF-8
    MINIMUM_SECONDS_RECHECK_TIME: "60"
    PLAYWRIGHT_DRIVER_URL: ws://changedetection-browser.changedetection.svc.cluster.local:3000?--user-data-dir=/profile/chromium&headful=true
    TZ: Europe/London
    USE_X_SETTINGS: "true"
  image:
    repository: ghcr.io/dgtlmoon/changedetection.io
    tag: latest@sha256:736331d2787f94d3201b64aa641e090f67e28577ba505bd7ba5d7c1841e1e0ca
    pullPolicy: IfNotPresent
  # Keep at 1Gi: browser-backed watches stitch screenshots in this app process;
  # 256Mi caused OOMKilled exit 137 while processing an Amazon watch.
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
      ephemeral-storage: 100Mi
    limits:
      memory: 1Gi
      ephemeral-storage: 100Mi

browser:
  name: changedetection-browser
  image:
    repository: dgtlmoon/sockpuppetbrowser
    digest: sha256:7116c61ef9cfce3d48a7efd9355d2fbe19f593ea3cfb52a5ded40ecbcb0a3f9d
    pullPolicy: IfNotPresent
  port: 3000
  statsPort: 8080
  tmpSizeLimit: 1Gi
  profile:
    mountPath: /profile
    claimName: changedetection-browser-profile-pvc
    fsGroup: 1000
  cleanup:
    intervalSeconds: 3600
    minAgeMinutes: 60
    image:
      repository: busybox
      tag: 1.38.0@sha256:8f2ffdcb46f1b83e46665954ec130e497b979db766854f79ca9eee43242b7e4c
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
        ephemeral-storage: 16Mi
      limits:
        memory: 32Mi
        ephemeral-storage: 16Mi
  env:
    SCREEN_WIDTH: "1920"
    SCREEN_HEIGHT: "1024"
    SCREEN_DEPTH: "16"
    MAX_CONCURRENT_CHROME_PROCESSES: "1"
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
      ephemeral-storage: 1Gi
    limits:
      memory: 1Gi
      ephemeral-storage: 1Gi

service:
  port: 5000
  targetPort: 5000

route:
  timeouts:
    request: 120s
    backendRequest: 120s

persistence:
  claimName: changedetection-pvc
  mountPath: /datastore
