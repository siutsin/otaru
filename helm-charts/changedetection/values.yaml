name: changedetection
namespace: changedetection

onepassword:
  key: changedetection
  property: config.yaml

deployment:
  image:
    repository: ghcr.io/dgtlmoon/changedetection.io
    tag: latest@sha256:c85fb73ce4e1986c90b9b747e0247cd67b0d4ebcce4718a5f7205dc64ccc178a
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 500Mi
      ephemeral-storage: 100Mi
    limits:
      memory: 500Mi
      ephemeral-storage: 100Mi

service:
  port: 5000
  targetPort: 5000

persistence:
  claimName: changedetection-pvc
  mountPath: /datastore
