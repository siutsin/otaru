name: changedetection
namespace: changedetection

onepassword:
  key: changedetection
  property: config.yaml

deployment:
  image:
    repository: ghcr.io/dgtlmoon/changedetection.io
    tag: latest@sha256:d89d4187221206f7f9f2c7946e7483815db905ca7d122644081aebd5d23ba391
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 100Mi
    limits:
      memory: 256Mi
      ephemeral-storage: 100Mi

browser:
  name: changedetection-browser
  image:
    repository: dgtlmoon/sockpuppetbrowser
    digest: sha256:7116c61ef9cfce3d48a7efd9355d2fbe19f593ea3cfb52a5ded40ecbcb0a3f9d
    pullPolicy: IfNotPresent
  port: 3000
  statsPort: 8080
  tmpSizeLimit: 1Gi
  profile:
    mountPath: /profile
    claimName: changedetection-browser-profile-pvc
    fsGroup: 1000
  env:
    SCREEN_WIDTH: "1920"
    SCREEN_HEIGHT: "1024"
    SCREEN_DEPTH: "16"
    MAX_CONCURRENT_CHROME_PROCESSES: "1"
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
      ephemeral-storage: 1Gi
    limits:
      memory: 1Gi
      ephemeral-storage: 1Gi

service:
  port: 5000
  targetPort: 5000

persistence:
  claimName: changedetection-pvc
  mountPath: /datastore
