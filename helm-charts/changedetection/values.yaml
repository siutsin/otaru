name: changedetection
namespace: changedetection

onepassword:
  key: changedetection
  property: config.yaml

deployment:
  image:
    repository: ghcr.io/dgtlmoon/changedetection.io
    tag: latest@sha256:45a90dd17a4012ce3046b246ff100f001f9e09a8114db496d6ed64ae3c8db2e9
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 500Mi
      ephemeral-storage: 100Mi
    limits:
      memory: 500Mi
      ephemeral-storage: 100Mi

service:
  port: 5000
  targetPort: 5000

persistence:
  claimName: changedetection-pvc
  mountPath: /datastore
