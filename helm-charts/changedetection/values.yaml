name: changedetection
namespace: changedetection

onepassword:
  key: changedetection
  property: config.yaml

deployment:
  env:
    ALLOW_IANA_RESTRICTED_ADDRESSES: "true"
    DISABLE_VERSION_CHECK: "true"
    FETCH_WORKERS: "1"
    HIDE_REFERER: "true"
    LANG: C.UTF-8
    LC_ALL: C.UTF-8
    MINIMUM_SECONDS_RECHECK_TIME: "60"
    PLAYWRIGHT_DRIVER_URL: ws://changedetection-browser.changedetection.svc.cluster.local:3000?--user-data-dir=/profile/chromium&headful=true
    TZ: Europe/London
    USE_X_SETTINGS: "true"
  image:
    repository: ghcr.io/dgtlmoon/changedetection.io
    # Pin to a specific version, not the mutable `latest` tag. An uncontrolled
    # `latest` bump can ship a datastore migration that resets watches on
    # restart. 0.55.7 resolves to the same digest `latest` currently points to,
    # so this pin is a no-op for the running pod. See documentation/gotcha.md.
    tag: 0.55.7@sha256:736331d2787f94d3201b64aa641e090f67e28577ba505bd7ba5d7c1841e1e0ca
    pullPolicy: IfNotPresent
  # Keep at 1Gi: browser-backed watches stitch screenshots in this app process;
  # 256Mi caused OOMKilled exit 137 while processing an Amazon watch.
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
      ephemeral-storage: 100Mi
    limits:
      memory: 1Gi
      ephemeral-storage: 100Mi

browser:
  name: changedetection-browser
  image:
    repository: dgtlmoon/sockpuppetbrowser
    digest: sha256:7116c61ef9cfce3d48a7efd9355d2fbe19f593ea3cfb52a5ded40ecbcb0a3f9d
    pullPolicy: IfNotPresent
  port: 3000
  statsPort: 8080
  tmpSizeLimit: 1Gi
  profile:
    mountPath: /profile
    claimName: changedetection-browser-profile-pvc
    fsGroup: 1000
  cleanup:
    intervalSeconds: 3600
    minAgeMinutes: 60
    image:
      repository: busybox
      # 2026-07-14: the previous digest (sha256:8f2ffdcb...) was the
      # arm64-only child manifest, not the multi-arch index -- worked by
      # accident while this pod only ever landed on arm64 nodes, then hit
      # "exec format error" the first time descheduler's new PodLifeTime
      # repave scheduled it onto amd64 nuc-00. This digest is the actual
      # multi-arch index (verified via registry API and against nuc-00's
      # own containerd image list).
      tag: 1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
      pullPolicy: IfNotPresent
    resources:
      # KRR 2026-07-05: profile cleanup sidecar peaked at ~100Mi during hourly prune runs.
      # ephemeral-storage 2026-07-07: container_limit_percentage reported 100% at 16Mi
      # (shared /profile/chromium volume usage attributed against this container's own
      # tiny limit); pod-level peak is only ~20Mi. Bump to 64Mi for headroom.
      requests:
        cpu: 10m
        memory: 128Mi
        ephemeral-storage: 64Mi
      limits:
        memory: 128Mi
        ephemeral-storage: 64Mi
  env:
    SCREEN_WIDTH: "1920"
    SCREEN_HEIGHT: "1024"
    SCREEN_DEPTH: "16"
    MAX_CONCURRENT_CHROME_PROCESSES: "1"
  resources:
    # KRR 2026-07-05: Playwright browser peaked at ~1.08Gi during Amazon watch fetches; 1Gi left ~6Mi headroom.
    # KRR 2026-07-09: 14-day peak grew to ~1.28Gi, exceeding the 1152Mi limit set above. Bumped to 1408Mi for headroom.
    # KRR 2026-07-18: CPU CRITICAL, 14d peak needs ~1189m against the 50m
    # request (memory unaffected, still GOOD at 1408Mi).
    # KRR 2026-07-18 (hotfix): the full 1189m request left this pod
    # Pending -- concurrent CPU upsizes in the same rollout (argocd-repo-
    # server to nuc-00, umami and kyverno-reports-controller relocating)
    # left no single node with both 1199m free CPU and 1536Mi free memory
    # at once. raspberrypi-03 (this pod's usual node) had 865m CPU free
    # but needed 1199m; every other node was short on memory instead.
    # Reduced to 700m, which fits raspberrypi-03 with ~155m spare. Full
    # KRR target deferred to a later pass once cluster headroom improves.
    requests:
      cpu: 700m
      memory: 1408Mi
      ephemeral-storage: 1Gi
    limits:
      memory: 1408Mi
      ephemeral-storage: 1Gi

service:
  port: 5000
  targetPort: 5000

route:
  timeouts:
    request: 120s
    backendRequest: 120s

persistence:
  claimName: changedetection-pvc
  mountPath: /datastore
