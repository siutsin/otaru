name: changedetection
namespace: changedetection

onepassword:
  key: changedetection
  property: config.yaml

deployment:
  image:
    repository: ghcr.io/dgtlmoon/changedetection.io
    tag: latest@sha256:2d0030e12494be9ebf6a6ebbbad46afe5763f498bbfefe9ebb7f0bf6be3ca5dc
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 100Mi
    limits:
      memory: 256Mi
      ephemeral-storage: 100Mi

service:
  port: 5000
  targetPort: 5000

persistence:
  claimName: changedetection-pvc
  mountPath: /datastore
