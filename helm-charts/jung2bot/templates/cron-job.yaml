apiVersion: batch/v1
kind: CronJob
metadata:
  name: off-work
  namespace: {{ .Values.namespace }}
spec:
  schedule: "*/{{ .Values.cron.offWork.env.cronInterval }} * * * *"
  concurrencyPolicy: Replace
  successfulJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 60
      template:
        spec:
          containers:
            - name: off-work
              image: {{ .Values.cron.image.repository }}:{{ .Values.cron.image.tag }}
              securityContext:
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              env:
                - name: CRON_INTERVAL
                  value: {{ .Values.cron.offWork.env.cronInterval | quote }}
                - name: OFF_FROM_WORK_URL
                  valueFrom:
                    secretKeyRef:
                      key: OFF_FROM_WORK_URL
                      name: jung2bot-secrets
              resources:
                requests:
                  cpu: "0.1"
                  memory: "100Mi"
                  ephemeral-storage: "100Mi"
                limits:
                  memory: "100Mi"
                  ephemeral-storage: "100Mi"
              readinessProbe:
                exec:
                  command:
                    - timeout
                initialDelaySeconds: 30
          restartPolicy: Never
          affinity:
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: scale-up-database
  namespace: {{ .Values.namespace }}
spec:
  # 9:57-59 am UTC = 5:57-59 pm HKT"
  schedule: "57-59 9 * * 1-5"
  concurrencyPolicy: Replace
  successfulJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 60
      template:
        spec:
          containers:
            - name: scale-up-database
              image: curlimages/curl:8.21.0
              securityContext:
                runAsNonRoot: true
                # curlimages/curl's non-root user ("curl_user") is named, not
                # numeric, in the image metadata. Kubelet cannot verify
                # runAsNonRoot from a named user alone, so without an
                # explicit numeric runAsUser the Job got stuck in
                # CreateContainerConfigError. UID 100 is curlimages/curl's
                # documented curl_user.
                runAsUser: 100
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              command: [ "curl" ]
              args:
                - "-v"
                - "-m"
                - "5"
                - "$(SCALE_UP_URL)"
              env:
                - name: SCALE_UP_URL
                  valueFrom:
                    secretKeyRef:
                      key: SCALE_UP_URL
                      name: jung2bot-secrets
              resources:
                requests:
                  cpu: "0.5"
                  memory: "500Mi"
                  ephemeral-storage: "100Mi"
                limits:
                  memory: "500Mi"
                  ephemeral-storage: "100Mi"
              readinessProbe:
                exec:
                  command:
                    - timeout
                initialDelaySeconds: 30
          restartPolicy: Never
          affinity:
