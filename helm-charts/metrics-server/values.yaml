metrics-server:
  podLabels:
    # metrics-server is scraped directly by the Kubernetes API aggregation path; keep its Pod IP outside ambient interception.
    istio.io/dataplane-mode: none
  service:
    annotations:
      mesh.otaru.io/non-ambient-endpoints: "true"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
      ephemeral-storage: 64Mi
    limits:
      memory: 128Mi
      ephemeral-storage: 64Mi
  replicas: 2
  podDisruptionBudget:
    enabled: true
    maxUnavailable: 1
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: metrics-server
            topologyKey: kubernetes.io/hostname
