name: longhorn
namespace: longhorn-system

longhorn:
  longhornManager:
    serviceAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9500"
    # KRR 2026-07-10: peak ~115m cpu / 403Mi mem over 14d; was unset.
    resources:
      requests:
        cpu: 150m
        memory: 512Mi
        ephemeral-storage: 64Mi
      limits:
        memory: 512Mi
        ephemeral-storage: 64Mi
  preUpgradeChecker:
    jobEnabled: false
  persistence:
    defaultClass: false
    # No PVC references this class -- everything uses longhorn-crypto-global.
    createStorageClass: false
  defaultSettings:
    allowCollectingLonghornUsageMetrics: false
    defaultReplicaCount: 2
    replicaSoftAntiAffinity: false
    replicaAutoBalance: best-effort
    storageReservedPercentageForDefaultDisk: "0"
    snapshotMaxCount: "250"
    autoCleanupSnapshotWhenDeleteBackup: true
    # Kyverno require-workload-resources (background scan) flagged
    # Deployment/csi-attacher, csi-provisioner, csi-resizer, csi-snapshotter,
    # and the longhorn-csi-plugin/node-driver-registrar/longhorn-liveness-probe
    # containers of the longhorn-csi-plugin DaemonSet as missing memory and
    # ephemeral-storage requests/limits. These are system-managed components
    # created directly by longhorn-manager, not by this Helm chart's
    # templates, so this Longhorn Setting (a JSON object keyed by component
    # name) is the only supported way to size them. No KRR data yet, so each
    # lightweight sidecar reuses the same size as the gateway chart's
    # shutdown-manager sidecar; longhorn-csi-plugin itself (does actual
    # mount/format work) gets a slightly larger allowance.
    # 2026-07-11: longhorn-csi-plugin OOMKilled (exit 137) on nuc-00, the node
    # with by far the most attached volumes (jellyfin + sftpgo). The 64Mi
    # limit only covered steady-state (~11-15Mi observed on other nodes) with
    # no headroom for mount/format-time spikes. Doubled to 128Mi.
    # 2026-07-11 (second bump): 128Mi still OOMKilled on nuc-00 and, after
    # raspberrypi-03 rejoined post-outage, on raspberrypi-03 too, both while a
    # mass volume-reattach/resync was in progress cluster-wide -- steady-state
    # stayed ~11-22Mi throughout, confirming this is a startup/reattach memory
    # spike, not a steady leak. Raised to 256Mi for real headroom under
    # concurrent reattach load rather than guessing again incrementally.
    # 2026-07-11 (third bump): 256Mi still OOMKilled on raspberrypi-03 when
    # two volumes needed mounting on it concurrently (home-assistant and a
    # teslamate CNPG replica landed there at the same time during the
    # post-rejoin reattach storm), then started failing on raspberrypi-02 too
    # as load shifted. Given two consecutive doublings both failed under
    # concurrent-mount conditions, moved to a more generous 512Mi -- initially
    # matching request to limit per this repo's usual convention.
    # 2026-07-11 (fourth change, requests decoupled from limits): every node
    # in this cluster already runs at 91-99% memory *requests* committed, so
    # reserving the full 512Mi spike allowance as a *request* on every node
    # (a DaemonSet, so this multiplies across all 5) immediately caused a
    # real scheduling failure elsewhere (a teslamate CNPG replica pod could
    # not schedule on any node: "0/5 nodes are available: 5 Insufficient
    # memory"). longhorn-csi-plugin's actual steady-state usage is ~11-22Mi;
    # the 512Mi is only needed as a ceiling for rare concurrent-mount spikes,
    # not a permanent reservation. Departs from this repo's usual
    # requests-equal-limits convention deliberately for this one spiky
    # sidecar, confirmed with the user, to stop wasting ~2.2Gi of falsely
    # reserved cluster memory.
    # 2026-07-11 (fifth bump, limit only): still OOMKilled at 512Mi on
    # nuc-00 while jellyfin (13 PVCs -- by far the most of any workload in
    # this cluster) mounted all of them at once. Since the request/limit
    # split above means a bigger limit costs nothing in steady-state
    # reservation, raised the ceiling generously to 1Gi to cover this
    # cluster's worst-case concurrent-mount workload rather than
    # incrementally re-testing smaller numbers again.
    # 2026-07-11 (sixth bump): still OOMKilled at 1Gi. Investigated upstream
    # before bumping again: Longhorn has no setting to throttle concurrent
    # mount/attach operations (checked the full values.yaml schema -- the
    # only concurrency limits are for replica rebuilds, backups, and engine
    # upgrades), and there is no official per-volume memory sizing formula
    # for this container (Longhorn's docs cite ~256Mi/TB for a different
    # component's in-memory read index; two related upstream issues,
    # longhorn/longhorn#12225 and #6645, confirm CSI/manager memory scaling
    # is a known, unresolved, undocumented area). jellyfin's combined PVC
    # size is ~1.4TB (13 volumes, one at 320Gi, six at 120Gi) -- by far the
    # largest single-node volume footprint in this cluster (everything else
    # is single-digit-Gi). With no smarter lever available, raised to 2Gi,
    # sized for this cluster's actual heaviest workload rather than another
    # blind doubling.
    systemManagedCSIComponentsResourceLimits: >-
      {"csi-attacher":{"requests":{"cpu":"10m","memory":"32Mi","ephemeral-storage":"32Mi"},"limits":{"memory":"32Mi","ephemeral-storage":"32Mi"}},
      "csi-provisioner":{"requests":{"cpu":"10m","memory":"32Mi","ephemeral-storage":"32Mi"},"limits":{"memory":"32Mi","ephemeral-storage":"32Mi"}},
      "csi-resizer":{"requests":{"cpu":"10m","memory":"32Mi","ephemeral-storage":"32Mi"},"limits":{"memory":"32Mi","ephemeral-storage":"32Mi"}},
      "csi-snapshotter":{"requests":{"cpu":"10m","memory":"32Mi","ephemeral-storage":"32Mi"},"limits":{"memory":"32Mi","ephemeral-storage":"32Mi"}},
      "longhorn-csi-plugin":{"requests":{"cpu":"25m","memory":"64Mi","ephemeral-storage":"32Mi"},"limits":{"memory":"2Gi","ephemeral-storage":"32Mi"}},
      "node-driver-registrar":{"requests":{"cpu":"10m","memory":"32Mi","ephemeral-storage":"32Mi"},"limits":{"memory":"32Mi","ephemeral-storage":"32Mi"}},
      "longhorn-liveness-probe":{"requests":{"cpu":"10m","memory":"32Mi","ephemeral-storage":"32Mi"},"limits":{"memory":"32Mi","ephemeral-storage":"32Mi"}}}
  defaultBackupStore:
    backupTarget: ~
    backupTargetCredentialSecret: b2-secret

encryption:
  secretName: longhorn-crypto

backup:
  secretName: b2-secret
