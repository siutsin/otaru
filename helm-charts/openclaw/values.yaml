name: openclaw
namespace: openclaw

image:
  repository: ghcr.io/openclaw/openclaw
  tag: 2026.5.22@sha256:1a5b25794693e2d3a3bfe1ef6a6061634bf44704c4650d65934e19f018664ced
  pullPolicy: IfNotPresent

service:
  port: 18789
  targetPort: 18789

route:
  hostname: ""

gateway:
  trustedProxies: []
  auth:
    rateLimit:
      maxAttempts: 10
      windowMs: 60000
      lockoutMs: 300000
      exemptLoopback: true

persistence:
  claimName: openclaw-pvc
  mountPath: /var/lib/openclaw

externalSecret:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-secret-store
  remoteRef:
    key: openclaw
    properties:
      gatewayToken: OPENCLAW_GATEWAY_TOKEN
      controlUiHostname: OPENCLAW_CONTROL_UI_HOSTNAME
      localModelApiKey: LOCAL_MODEL_API_KEY
      localModelBaseUrl: LOCAL_MODEL_BASE_URL
      localModelId: LOCAL_MODEL_ID
      localModelName: LOCAL_MODEL_NAME
      localModelInputJson: LOCAL_MODEL_INPUT_JSON

secret:
  name: openclaw-secrets

agents:
  instructions: |
    # OpenClaw

    - You are running inside the `otaru` cluster.
    - Prefer internal service endpoints when reaching cluster services.
    - Treat all secrets as external and never print them back verbatim.
  defaults:
    experimental:
      localModelLean: true

browser:
  enabled: false

tools:
  byProvider:
    local:
      deny:
        - browser
        - web_fetch
        - web_search
  web:
    search:
      enabled: false
    fetch:
      enabled: false

localModel:
  providerId: local
  api: openai-completions
  timeoutSeconds: 300
  contextWindow: 120000
  maxTokens: 8192
  reasoning: false
  request:
    allowPrivateNetwork: true

probes:
  startup:
    path: /healthz
    periodSeconds: 5
    timeoutSeconds: 10
    failureThreshold: 60
  liveness:
    path: /healthz
    initialDelaySeconds: 90
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 4
  readiness:
    path: /readyz
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 3

resources:
  requests:
    cpu: 500m
    memory: 1Gi
    ephemeralStorage: 1Gi
  limits:
    memory: 1Gi
    ephemeralStorage: 1Gi

initContainer:
  image:
    repository: busybox
    tag: 1.36.1@sha256:bd44eb136a95dcc8dc58995e43abc40a413f2e8e3d4a2aae6bccbe94686acb05
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
      ephemeralStorage: 16Mi
    limits:
      memory: 32Mi
      ephemeralStorage: 16Mi
