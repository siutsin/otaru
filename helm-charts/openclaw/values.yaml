name: openclaw
namespace: openclaw

image:
  repository: ghcr.io/openclaw/openclaw
  tag: 2026.5.22@sha256:dcfd148777401d1bbdc63eab5c2f280bbfa912dfb1818566f9d66bb96ffb3f95
  pullPolicy: IfNotPresent

service:
  port: 18789
  targetPort: 18789

route:
  hostname: ""
  timeouts:
    request: 360s
    backendRequest: 360s

gateway:
  trustedProxies: []
  auth:
    rateLimit:
      maxAttempts: 10
      windowMs: 60000
      lockoutMs: 300000
      exemptLoopback: true

persistence:
  claimName: openclaw-pvc
  mountPath: /var/lib/openclaw

externalSecret:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-secret-store
  remoteRef:
    key: openclaw
    properties:
      gatewayToken: OPENCLAW_GATEWAY_TOKEN
      controlUiHostname: OPENCLAW_CONTROL_UI_HOSTNAME
      localModelApiKey: LOCAL_MODEL_API_KEY
      localModelBaseUrl: LOCAL_MODEL_BASE_URL
      localModelId: LOCAL_MODEL_ID
      localModelName: LOCAL_MODEL_NAME
      localModelInputJson: LOCAL_MODEL_INPUT_JSON
      telegramBotToken: TELEGRAM_BOT_TOKEN

secret:
  name: openclaw-secrets

agents:
  instructions: |
    # OpenClaw

    - You are running inside the `otaru` cluster.
    - Prefer internal service endpoints when reaching cluster services.
    - Treat all secrets as external and never print them back verbatim.
  defaults:
    experimental:
      localModelLean: true

browser:
  enabled: false

tools:
  byProvider:
    local:
      deny:
        - browser
        - web_fetch
        - web_search
  web:
    search:
      enabled: false
    fetch:
      enabled: false

channels:
  defaults:
    groupPolicy: allowlist
    heartbeat:
      showOk: false
      showAlerts: true
      useIndicator: true
  telegram:
    enabled: true
    dmPolicy: pairing
    groupPolicy: allowlist
    groups:
      "*":
        requireMention: true
    streaming:
      mode: progress
    replyToMode: first
    linkPreview: false

localModel:
  providerId: local
  api: openai-completions
  timeoutSeconds: 300
  contextWindow: 120000
  maxTokens: 8192
  reasoning: false
  request:
    allowPrivateNetwork: true

probes:
  startup:
    path: /healthz
    periodSeconds: 5
    timeoutSeconds: 10
    failureThreshold: 60
  liveness:
    path: /healthz
    initialDelaySeconds: 90
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 4
  readiness:
    path: /readyz
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 3

resources:
  # KRR 2026-07-05: live peak ~763Mi working set; 1Gi request reserved ~1.3x actual usage.
  requests:
    cpu: 320m
    memory: 768Mi
    ephemeralStorage: 1Gi
  limits:
    memory: 768Mi
    ephemeralStorage: 1Gi

initContainer:
  image:
    repository: busybox
    tag: 1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
      ephemeralStorage: 16Mi
    limits:
      memory: 32Mi
      ephemeralStorage: 16Mi
