{{- $gatewayToken := "{{ .gatewayToken | toJson }}" -}}
{{- $localModelApiKey := "{{ .localModelApiKey | toJson }}" -}}
{{- $localModelBaseUrl := "{{ .localModelBaseUrl | toJson }}" -}}
{{- $localModelId := "{{ .localModelId | toJson }}" -}}
{{- $localModelName := "{{ .localModelName | toJson }}" -}}
{{- $localModelInputJson := "{{ .localModelInputJson | fromJson | toJson }}" -}}
{{- $telegramBotToken := "{{ .telegramBotToken | toJson }}" -}}
{{- $controlUiOrigin := "{{ printf \"https://%s\" .controlUiHostname | toJson }}" -}}
{{- $stateDir := .Values.persistence.mountPath -}}
{{- $providerId := .Values.localModel.providerId -}}
{{- $primaryModel := printf "{{ printf \"%s/%%s\" .localModelId | toJson }}" $providerId -}}
{{- $toolsByProvider := .Values.tools.byProvider | default dict -}}
{{- $providerTools := index $toolsByProvider $providerId | default dict -}}
{{- $channels := .Values.channels | default dict -}}
{{- $telegram := $channels.telegram | default dict -}}
{{- $telegramEnabled := true -}}
{{- if hasKey $telegram "enabled" -}}
{{- $telegramEnabled = $telegram.enabled -}}
{{- end -}}
{{- $localRequest := .Values.localModel.request | default dict -}}
{{- $allowPrivateNetwork := true -}}
{{- if hasKey $localRequest "allowPrivateNetwork" -}}
{{- $allowPrivateNetwork = $localRequest.allowPrivateNetwork -}}
{{- end -}}
{{- $gateway := .Values.gateway | default dict -}}
{{- $gatewayAuth := $gateway.auth | default dict -}}
{{- $gatewayAuthRateLimit := $gatewayAuth.rateLimit | default dict -}}
{{- $exemptLoopback := true -}}
{{- if hasKey $gatewayAuthRateLimit "exemptLoopback" -}}
{{- $exemptLoopback = $gatewayAuthRateLimit.exemptLoopback -}}
{{- end -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.secret.name }}
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
    name: {{ .Values.externalSecret.secretStoreRef.name }}
  target:
    name: {{ .Values.secret.name }}
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: Opaque
      metadata:
        annotations:
          reloader.stakater.com/auto: "true"
      data:
        openclaw.json: |
          {
            gateway: {
              mode: "local",
              bind: "lan",
              port: {{ .Values.service.targetPort }},
              trustedProxies: {{ $gateway.trustedProxies | default list | toJson }},
              controlUi: {
                allowedOrigins: [{{ $controlUiOrigin }}],
              },
              auth: {
                mode: "token",
                token: {{ $gatewayToken }},
                rateLimit: {
                  maxAttempts: {{ $gatewayAuthRateLimit.maxAttempts | default 10 }},
                  windowMs: {{ $gatewayAuthRateLimit.windowMs | default 60000 }},
                  lockoutMs: {{ $gatewayAuthRateLimit.lockoutMs | default 300000 }},
                  exemptLoopback: {{ $exemptLoopback }},
                },
              },
            },
            browser: {
              enabled: {{ .Values.browser.enabled | default false }},
            },
            tools: {
              byProvider: {
                {{ $providerId | quote }}: {
                  deny: {{ $providerTools.deny | default list | toJson }},
                },
              },
              web: {
                search: {
                  enabled: {{ .Values.tools.web.search.enabled | default false }},
                },
                fetch: {
                  enabled: {{ .Values.tools.web.fetch.enabled | default false }},
                },
              },
            },
            channels: {
              defaults: {
                groupPolicy: {{ .Values.channels.defaults.groupPolicy | toJson }},
                heartbeat: {{ .Values.channels.defaults.heartbeat | toJson }},
              },
              telegram: {
                enabled: {{ $telegramEnabled }},
                botToken: {{ $telegramBotToken }},
                dmPolicy: {{ .Values.channels.telegram.dmPolicy | toJson }},
                groupPolicy: {{ .Values.channels.telegram.groupPolicy | toJson }},
                groups: {{ .Values.channels.telegram.groups | toJson }},
                streaming: {{ .Values.channels.telegram.streaming | toJson }},
                replyToMode: {{ .Values.channels.telegram.replyToMode | toJson }},
                linkPreview: {{ .Values.channels.telegram.linkPreview | default false }},
              },
            },
            agents: {
              defaults: {
                workspace: "{{ $stateDir }}/workspace",
                experimental: {
                  localModelLean: {{ .Values.agents.defaults.experimental.localModelLean | default false }},
                },
                model: {
                  primary: {{ $primaryModel }},
                },
                models: {
                  {{ $primaryModel }}: {
                    alias: {{ $localModelName }},
                  },
                },
              },
            },
            models: {
              mode: "merge",
              providers: {
                {{ $providerId | quote }}: {
                  baseUrl: {{ $localModelBaseUrl }},
                  apiKey: {{ $localModelApiKey }},
                  api: {{ .Values.localModel.api | toJson }},
                  timeoutSeconds: {{ .Values.localModel.timeoutSeconds }},
                  request: {
                    allowPrivateNetwork: {{ $allowPrivateNetwork }},
                    {{- with $localRequest.tls }}
                    tls: {
                      {{- if hasKey . "insecureSkipVerify" }}
                      insecureSkipVerify: {{ .insecureSkipVerify }},
                      {{- end }}
                    },
                    {{- end }}
                  },
                  models: [
                    {
                      id: {{ $localModelId }},
                      name: {{ $localModelName }},
                      reasoning: {{ .Values.localModel.reasoning }},
                      input: {{ $localModelInputJson }},
                      cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 },
                      contextWindow: {{ .Values.localModel.contextWindow }},
                      maxTokens: {{ .Values.localModel.maxTokens }},
                    },
                  ],
                },
              },
            },
          }
  data:
    - secretKey: gatewayToken
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        nullBytePolicy: Ignore
        key: {{ .Values.externalSecret.remoteRef.key }}
        metadataPolicy: None
        property: {{ .Values.externalSecret.remoteRef.properties.gatewayToken }}
    - secretKey: controlUiHostname
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        nullBytePolicy: Ignore
        key: {{ .Values.externalSecret.remoteRef.key }}
        metadataPolicy: None
        property: {{ .Values.externalSecret.remoteRef.properties.controlUiHostname }}
    - secretKey: localModelApiKey
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        nullBytePolicy: Ignore
        key: {{ .Values.externalSecret.remoteRef.key }}
        metadataPolicy: None
        property: {{ .Values.externalSecret.remoteRef.properties.localModelApiKey }}
    - secretKey: localModelBaseUrl
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        nullBytePolicy: Ignore
        key: {{ .Values.externalSecret.remoteRef.key }}
        metadataPolicy: None
        property: {{ .Values.externalSecret.remoteRef.properties.localModelBaseUrl }}
    - secretKey: localModelId
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        nullBytePolicy: Ignore
        key: {{ .Values.externalSecret.remoteRef.key }}
        metadataPolicy: None
        property: {{ .Values.externalSecret.remoteRef.properties.localModelId }}
    - secretKey: localModelName
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        nullBytePolicy: Ignore
        key: {{ .Values.externalSecret.remoteRef.key }}
        metadataPolicy: None
        property: {{ .Values.externalSecret.remoteRef.properties.localModelName }}
    - secretKey: localModelInputJson
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        nullBytePolicy: Ignore
        key: {{ .Values.externalSecret.remoteRef.key }}
        metadataPolicy: None
        property: {{ .Values.externalSecret.remoteRef.properties.localModelInputJson }}
    # Telegram is enabled for this deployment, so token import is intentionally blocking.
    - secretKey: telegramBotToken
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        nullBytePolicy: Ignore
        key: {{ .Values.externalSecret.remoteRef.key }}
        metadataPolicy: None
        property: {{ .Values.externalSecret.remoteRef.properties.telegramBotToken }}
