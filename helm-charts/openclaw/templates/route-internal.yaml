{{- $gateway := .Values.gateway | default dict -}}
{{- $route := .Values.route | default dict -}}
{{- $gatewayName := $gateway.name | default "gateway" -}}
{{- $gatewayNamespace := $gateway.namespace | default "gateway" -}}
{{- $hostname := required "route.hostname is required" $route.hostname -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.name }}-internal
  namespace: {{ .Values.namespace }}
spec:
  hostnames:
    - {{ $hostname | quote }}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $gatewayName }}
      namespace: {{ $gatewayNamespace }}
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.name }}
          port: {{ .Values.service.port }}
          weight: 1
