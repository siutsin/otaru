---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: heartbeats-operator
    app.kubernetes.io/version: v0.185.0
    control-plane: controller-manager
  name: heartbeats-operator-controller-manager
  namespace: heartbeats-operator-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: heartbeats-operator
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: heartbeats-operator
        app.kubernetes.io/version: v0.185.0
        control-plane: controller-manager
    spec:
      containers:
        - args:
            - --metrics-bind-address=:8443
            - --leader-elect
            - --health-probe-bind-address=:8081
          command:
            - /manager
          image: ghcr.io/siutsin/heartbeats:v0.185.0
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          name: manager
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
          resources:
            limits:
              ephemeral-storage: 64Mi
              memory: 128Mi
            requests:
              cpu: 10m
              ephemeral-storage: 64Mi
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: heartbeats-operator-controller-manager
      terminationGracePeriodSeconds: 10
