apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: k8s-mcp-internal
  namespace: {{ .Values.namespace }}
spec:
  hostnames:
    - k8s-mcp.internal.siutsin.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ingress
      namespace: cilium-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: kubernetes-mcp-server
          port: 8080
          weight: 1
