name: k8s-mcp
namespace: kubernetes-mcp-server

kubernetes-mcp-server:
  image:
    registry: quay.io
    repository: containers/kubernetes_mcp_server
    version: v0.0.63@sha256:9317449ed47916a297f71b955eab57402064de852bf1fb007c4e0705754de2b3
  ingress:
    enabled: false
  service:
    port: 8080
  fullnameOverride: kubernetes-mcp-server
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
      ephemeral-storage: 64Mi
    limits:
      memory: 128Mi
      ephemeral-storage: 64Mi
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname

