name: amazon-eks-pod-identity-webhook
namespace: default

pod-identity-webhook:
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 64Mi
  config:
    defaultAwsRegion: eu-west-1
    tokenAudience: oidc.siutsin.com
