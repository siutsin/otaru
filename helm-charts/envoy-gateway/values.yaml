_shared:
  envoyGatewayResources: &envoyGatewayResources
    requests:
      cpu: 100m
      memory: 128Mi
      ephemeral-storage: 64Mi
    limits:
      memory: 128Mi
      ephemeral-storage: 64Mi
  envoyProxyResources: &envoyProxyResources
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 128Mi
    limits:
      memory: 256Mi
      ephemeral-storage: 128Mi

name: gateway
namespace: gateway
controllerNamespace: envoy-gateway-system
gatewayClassName: eg
metallbNamespace: metallb-system
bootstrap:
  enabled: false
integrations:
  certManager: true
  externalSecrets: true
  heartbeats: true

service:
  name: gateway

tls:
  secretName: tls-certificate

serviceAllocation:
  selectorLabel: gateway.envoyproxy.io/owning-gateway-name

l2AnnouncementPolicy:
  interface:
    - eth0

loadBalancerIPPool:
  cidr: 192.168.10.51/32

envoy-gateway:
  # gateway-api owns the safe-upgrade ValidatingAdmissionPolicy.
  crds:
    gatewayAPI:
      safeUpgradePolicy:
        enabled: false
  deployment:
    envoyGateway:
      resources: *envoyGatewayResources
  config:
    envoyGateway:
      provider:
        type: Kubernetes
        kubernetes:
          deploy:
            type: GatewayNamespace

envoyProxy:
  # 2026-07-07: single-replica Envoy data plane meant every public request
  # (including WebGazer/blackbox uptime probes) depended on one pod with no
  # failover. Bumped to 2 with anti-affinity so a brief hiccup on one node
  # does not cause a visible gap for any app behind this shared gateway.
  replicas: 2
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: envoy
                gateway.networking.k8s.io/gateway-name: gateway
            topologyKey: kubernetes.io/hostname
  resources: *envoyProxyResources
