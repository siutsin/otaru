_shared:
  envoyGatewayResources: &envoyGatewayResources
    requests:
      cpu: 100m
      memory: 128Mi
      ephemeral-storage: 64Mi
    limits:
      memory: 128Mi
      ephemeral-storage: 64Mi
  envoyProxyResources: &envoyProxyResources
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 128Mi
    limits:
      memory: 256Mi
      ephemeral-storage: 128Mi

name: gateway
namespace: gateway
controllerNamespace: envoy-gateway-system
gatewayClassName: eg
metallbNamespace: metallb-system
bootstrap:
  enabled: false
integrations:
  certManager: true
  externalSecrets: true
  heartbeats: true

service:
  name: gateway

tls:
  secretName: tls-certificate

serviceAllocation:
  selectorLabel: gateway.envoyproxy.io/owning-gateway-name

l2AnnouncementPolicy:
  interface:
    - eth0

loadBalancerIPPool:
  cidr: 192.168.10.51/32

envoy-gateway:
  deployment:
    envoyGateway:
      resources: *envoyGatewayResources
  config:
    envoyGateway:
      provider:
        type: Kubernetes
        kubernetes:
          deploy:
            type: GatewayNamespace

envoyProxy:
  resources: *envoyProxyResources
