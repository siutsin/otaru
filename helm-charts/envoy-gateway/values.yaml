_shared:
  envoyGatewayResources: &envoyGatewayResources
    requests:
      cpu: 100m
      memory: 128Mi
      ephemeral-storage: 64Mi
    limits:
      memory: 128Mi
      ephemeral-storage: 64Mi
  envoyProxyResources: &envoyProxyResources
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 128Mi
    limits:
      memory: 256Mi
      ephemeral-storage: 128Mi
  # Kyverno require-workload-resources (background scan) flagged the
  # shutdown-manager sidecar in the gateway Deployment as missing memory
  # and ephemeral-storage requests/limits (only a CPU request is applied
  # by envoy-gateway's own hardcoded default). No KRR data yet for this
  # container, so reuse its existing 10m CPU request and pair it with a
  # memory/ephemeral-storage size similar to envoyGatewayResources above,
  # since both are lightweight Go control-plane sidecars.
  shutdownManagerResources: &shutdownManagerResources
    requests:
      cpu: 10m
      memory: 32Mi
      ephemeral-storage: 32Mi
    limits:
      memory: 32Mi
      ephemeral-storage: 32Mi

name: gateway
namespace: gateway
controllerNamespace: envoy-gateway-system
gatewayClassName: eg
metallbNamespace: metallb-system
bootstrap:
  enabled: false
integrations:
  certManager: true
  externalSecrets: true
  heartbeats: true

service:
  name: gateway

tls:
  secretName: tls-certificate

serviceAllocation:
  selectorLabel: gateway.envoyproxy.io/owning-gateway-name

# 2026-07-09: nuc-00's speaker logged "the specified interfaces used to
# announce LB IP don't exist" for 192.168.10.51 whenever nuc-00 became the
# announcing node, because nuc-00's NIC is eno1, not eth0 (Intel NUC naming
# differs from the Raspberry Pis). The gateway VIP then had no working ARP
# announcement from that node, making it unreachable from off-cluster clients
# until leadership moved elsewhere. Split into per-node interfaces, mirroring
# the working pattern already used for the API server VIP in
# helm-charts/metallb-vip/values.yaml.
l2AnnouncementPolicy:
  advertisements:
    - interfaces:
        - eth0
      nodeSelectors:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - raspberrypi-00
                - raspberrypi-01
                - raspberrypi-02
                - raspberrypi-03
    - nameSuffix: nuc-00
      interfaces:
        - eno1
      nodeSelectors:
        - matchLabels:
            kubernetes.io/hostname: nuc-00

loadBalancerIPPool:
  cidr: 192.168.10.51/32

envoy-gateway:
  # gateway-api owns the safe-upgrade ValidatingAdmissionPolicy.
  crds:
    gatewayAPI:
      safeUpgradePolicy:
        enabled: false
  deployment:
    envoyGateway:
      resources: *envoyGatewayResources
  config:
    envoyGateway:
      provider:
        type: Kubernetes
        kubernetes:
          deploy:
            type: GatewayNamespace

envoyProxy:
  # 2026-07-07: single-replica Envoy data plane meant every public request
  # (including WebGazer/blackbox uptime probes) depended on one pod with no
  # failover. Bumped to 2 with anti-affinity so a brief hiccup on one node
  # does not cause a visible gap for any app behind this shared gateway.
  replicas: 2
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: envoy
                gateway.networking.k8s.io/gateway-name: gateway
            topologyKey: kubernetes.io/hostname
  resources: *envoyProxyResources
  shutdownManagerResources: *shutdownManagerResources
