apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
spec:
  gatewayClassName: {{ .Values.gatewayClassName }}
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: {{ .Values.service.name }}
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            group: ""
            name: {{ .Values.tls.secretName }}
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - argocd
                  - atlantis
                  - changedetection
                  - cyberchef
                  - excalidraw
                  - gateway
                  - home-assistant
                  - httpbin
                  - istio-system
                  - jellyfin
                  - jsoncrack
                  - jung2bot
                  - jung2bot-dev
                  - kubernetes-mcp-server
                  - longhorn-system
                  - monitoring
                  - teslamate
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - argocd
                  - atlantis
                  - changedetection
                  - cyberchef
                  - excalidraw
                  - gateway
                  - home-assistant
                  - httpbin
                  - istio-system
                  - jellyfin
                  - jsoncrack
                  - jung2bot
                  - jung2bot-dev
                  - kubernetes-mcp-server
                  - longhorn-system
                  - monitoring
                  - teslamate
    - name: jellyfin-sftp
      protocol: TCP
      port: 2022
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - jellyfin
    - name: dns-tcp
      protocol: TCP
      port: 53
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - blocky
    - name: dns-udp
      protocol: UDP
      port: 53
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - blocky
    - name: coap-udp
      protocol: UDP
      port: 5683
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - home-assistant
