apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: {{ .Values.service.name }}
  namespace: {{ .Values.namespace }}
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: {{ .Values.envoyProxy.replicas }}
        container:
          resources:
{{ toYaml .Values.envoyProxy.resources | indent 12 }}
        pod:
          # Ambient DNS capture intercepts outbound UDP/TCP 53 from the proxy
          # and answers via cluster DNS, so Envoy's DNS UDPRoute/TCPRoute never
          # reaches blocky. Opt the proxy pods out so north-south DNS on :53 is
          # plain-proxied to blocky-dns.
          annotations:
            ambient.istio.io/dns-capture: "false"
          affinity:
{{ toYaml .Values.envoyProxy.affinity | indent 12 }}
        # Envoy Gateway v1.8 has no first-class field for the
        # shutdown-manager sidecar's resources (only its container image is
        # configurable directly); a StrategicMerge patch on the rendered
        # Deployment is the documented way to reach it.
        # https://gateway.envoyproxy.io/docs/tasks/operations/customize-envoyproxy/
        patch:
          type: StrategicMerge
          value:
            spec:
              template:
                spec:
                  containers:
                    - name: shutdown-manager
                      resources:
{{ toYaml .Values.envoyProxy.shutdownManagerResources | indent 24 }}
      envoyService:
        name: {{ .Values.service.name }}
