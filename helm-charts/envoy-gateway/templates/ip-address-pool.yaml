apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.metallbNamespace }}
spec:
  addresses:
    - {{ .Values.loadBalancerIPPool.cidr }}
  serviceAllocation:
    serviceSelectors:
      - matchLabels:
          {{ .Values.serviceAllocation.selectorLabel }}: {{ .Values.name }}
