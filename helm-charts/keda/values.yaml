_shared:
  preferredPodAntiAffinity: &preferredPodAntiAffinity
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname

keda:
  resources:
    operator:
      requests:
        cpu: 100m
        memory: 128Mi
        ephemeral-storage: 64Mi
      limits:
        memory: 128Mi
        ephemeral-storage: 64Mi
    metricServer:
      requests:
        cpu: 50m
        memory: 128Mi
        ephemeral-storage: 64Mi
      limits:
        memory: 128Mi
        ephemeral-storage: 64Mi
  operator:
    affinity:
      <<: *preferredPodAntiAffinity
  metricsServer:
    affinity:
      <<: *preferredPodAntiAffinity
  webhooks:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
        ephemeral-storage: 64Mi
      limits:
        memory: 64Mi
        ephemeral-storage: 64Mi
    affinity:
      <<: *preferredPodAntiAffinity
  affinity:
    <<: *preferredPodAntiAffinity
