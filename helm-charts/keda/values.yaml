keda:
  resources:
    operator:
      requests:
        cpu: 100m
        memory: 128Mi
        ephemeral-storage: 64Mi
      limits:
        cpu: ~
        memory: 128Mi
        ephemeral-storage: 64Mi
    metricServer:
      requests:
        cpu: 50m
        memory: 128Mi
        ephemeral-storage: 64Mi
      limits:
        cpu: ~
        memory: 128Mi
        ephemeral-storage: 64Mi
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: volume
                operator: NotIn
                values:
                  - "true"
