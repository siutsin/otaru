name: kyverno-policy
namespace: kyverno

clusterSecretStorePolicy:
  enabled: true
  storeName: onepassword-secret-store
  allowedNamespaces:
    argocd:
      - argocd-secret
      - heartbeats
      - openclaw
      - Otaru - GitHub Private
    blocky:
      - blocky
      - heartbeats
    changedetection:
      - changedetection
    cloudflare-tunnel:
      - cloudflare-tunnel-credentials
    external-secrets:
      - 1Password Token
    gateway:
      - cloudflare-acme-verification-secret
      - heartbeats
    umami:
      - Umami
      - b2-secret-cloudnative-pg
      - heartbeats
    home-assistant:
      - heartbeats
    jung2bot:
      - jung2bot
    longhorn-system:
      - b2-secret
      - longhorn-crypto
    monitoring:
      - grafana
      - heartbeats
      - monitoring
    openclaw:
      - openclaw
    teslamate:
      - b2-secret-cloudnative-pg
      - heartbeats
      - teslamate

workloadResourcesPolicy:
  enabled: true
  excludedNamespaces:
    - kube-node-lease
    - kube-public
    - kube-system
    - kyverno

meshAuthorizationPolicy:
  enabled: true
  failureAction: Audit
  namespaceSelector:
    matchLabels:
      istio.io/dataplane-mode: ambient

barmanObjectStorePolicy:
  enabled: true
  allowedNamespaces:
    teslamate:
      objectStores:
        - b2-backup
      credentialSecrets:
        - b2-backup-credentials
    umami:
      objectStores:
        - b2-backup
      credentialSecrets:
        - b2-backup-credentials

requireImageTagPolicy:
  enabled: true
  excludedNamespaces:
    - kube-node-lease
    - kube-public
    - kube-system
    - kyverno

requireContainerHardeningPolicy:
  enabled: true
  excludedNamespaces:
    - longhorn-system
    - istio-system
    - metallb-system
    - kube-system
