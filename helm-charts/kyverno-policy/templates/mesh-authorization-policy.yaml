{{- if .Values.meshAuthorizationPolicy.enabled }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-mesh-authorization-policy
spec:
  admission: true
  background: true
  emitWarning: false
  rules:
    - name: require-authorization-policy-for-ambient-services
      match:
        any:
          - resources:
              kinds:
                - Service
              operations:
                - CREATE
                - UPDATE
              namespaceSelector:
{{- toYaml .Values.meshAuthorizationPolicy.namespaceSelector | nindent 16 }}
      preconditions:
        all:
          - key: {{ printf "{{ (request.object.spec.selector || `{}`) | length(@) }}" | quote }}
            operator: GreaterThan
            value: 0
          - key: {{ printf "{{ request.object.spec.ports[?protocol == 'TCP' || protocol == null] | length(@) }}" | quote }}
            operator: GreaterThan
            value: 0
      context:
        - name: authorizationPolicyCount
          apiCall:
            method: GET
            urlPath: "/apis/security.istio.io/v1/namespaces/{{ `{{ request.namespace }}` }}/authorizationpolicies"
            jmesPath: >-
              items[?length((spec.targetRefs || `[]`)[?(group == null || group == '' || group == 'core') &&
              kind == 'Service' && name == '{{ `{{ request.object.metadata.name }}` }}']) > `0`] | length(@)
            default: 0
      skipBackgroundRequests: true
      validate:
        allowExistingViolations: true
        failureAction: {{ .Values.meshAuthorizationPolicy.failureAction }}
        message: >-
          Selector-backed Services with TCP ports in ambient mesh namespaces must
          have an AuthorizationPolicy in the same namespace with targetRefs
          pointing at that Service unless explicitly annotated as a
          non-ambient endpoint Service.
        deny:
          conditions:
            all:
              - key: "{{ `{{ authorizationPolicyCount }}` }}"
                operator: Equals
                value: 0
              - key: {{ printf "{{ request.object.metadata.annotations.\"mesh.otaru.io/non-ambient-endpoints\" || '' }}" | quote }}
                operator: NotEquals
                value: "true"
    - name: require-workload-authorization-policy-for-prometheus-scrapes
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
                - UPDATE
              namespaceSelector:
{{- toYaml .Values.meshAuthorizationPolicy.namespaceSelector | nindent 16 }}
      preconditions:
        all:
          - key: {{ printf "{{ request.object.metadata.annotations.\"prometheus.io/scrape\" || '' }}" | quote }}
            operator: Equals
            value: "true"
          - key: {{ printf "{{ request.object.metadata.labels.\"app.kubernetes.io/name\" || '' }}" | quote }}
            operator: NotEquals
            value: ""
      context:
        - name: workloadAuthorizationPolicyCount
          apiCall:
            method: GET
            urlPath: "/apis/security.istio.io/v1/namespaces/{{ `{{ request.namespace }}` }}/authorizationpolicies"
            jmesPath: >-
              items[?spec.selector.matchLabels."app.kubernetes.io/name" ==
              '{{ `{{ request.object.metadata.labels."app.kubernetes.io/name" }}` }}'] | length(@)
            default: 0
      skipBackgroundRequests: true
      validate:
        allowExistingViolations: true
        failureAction: {{ .Values.meshAuthorizationPolicy.failureAction }}
        message: >-
          Prometheus-scraped Pods in ambient mesh namespaces must have a
          workload-selector AuthorizationPolicy in the same namespace selecting
          the Pod's app.kubernetes.io/name label. Service targetRefs policies do
          not cover Prometheus pod-IP scrapes.
        deny:
          conditions:
            all:
              - key: "{{ `{{ workloadAuthorizationPolicyCount }}` }}"
                operator: Equals
                value: 0
    - name: require-non-ambient-pods-for-non-ambient-service-opt-outs
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
                - UPDATE
              namespaceSelector:
{{- toYaml .Values.meshAuthorizationPolicy.namespaceSelector | nindent 16 }}
      preconditions:
        all:
          - key: {{ printf "{{ request.object.metadata.labels.\"istio.io/dataplane-mode\" || '' }}" | quote }}
            operator: NotEquals
            value: none
      context:
        - name: selectedNonAmbientEndpointServiceCount
          apiCall:
            method: GET
            urlPath: "/api/v1/namespaces/{{ `{{ request.namespace }}` }}/services"
            jmesPath: >-
              items[?metadata.annotations."mesh.otaru.io/non-ambient-endpoints" == 'true' &&
              label_match(spec.selector, `{{ "{{" }} request.object.metadata.labels || `{}` {{ "}}" }}`)] | length(@)
            default: 0
      skipBackgroundRequests: true
      validate:
        allowExistingViolations: true
        failureAction: {{ .Values.meshAuthorizationPolicy.failureAction }}
        message: >-
          Services annotated as non-ambient endpoint Services may only select
          pods with istio.io/dataplane-mode=none.
        deny:
          conditions:
            all:
              - key: "{{ `{{ selectedNonAmbientEndpointServiceCount }}` }}"
                operator: GreaterThan
                value: 0
  validationFailureAction: {{ .Values.meshAuthorizationPolicy.failureAction }}
{{- end }}
