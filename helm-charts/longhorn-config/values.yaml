name: longhorn
namespace: longhorn-system

settings:
  allow-collecting-longhorn-usage-metrics: "false"

# Per-node Longhorn disk settings. Use a stable disk name (`default`) so rebuilds
# get the same Node CR shape from Git instead of FSID-derived default-disk-<hex>.
#
# storageReservedGiB: space held back on each node for the OS, kubelet, container
# images, and logs. Longhorn subtracts this from schedulable capacity. Tune per
# physical SSD size rather than using the global percentage default.
nodes:
  raspberrypi-00:
    allowScheduling: true
    disks:
      default:
        path: /var/lib/longhorn/
        # 256 GB Lexar NM620; smaller disk needs a larger share reserved for the OS.
        storageReservedGiB: 25
  raspberrypi-01:
    allowScheduling: true
    disks:
      default:
        path: /var/lib/longhorn/
        # 4 TB Crucial P3 Plus; fixed OS headroom on a large data disk.
        storageReservedGiB: 50
  raspberrypi-02:
    allowScheduling: true
    disks:
      default:
        path: /var/lib/longhorn/
        # 4 TB Crucial P3 Plus; fixed OS headroom on a large data disk.
        storageReservedGiB: 50
  raspberrypi-03:
    allowScheduling: true
    disks:
      default:
        path: /var/lib/longhorn/
        # 500 GB Crucial P2 worker NVMe.
        storageReservedGiB: 30
  nuc-00:
    allowScheduling: true
    disks:
      default:
        path: /var/lib/longhorn/
        # 64 GB SSD; keep a generous slice for Ubuntu and kubelet on a tiny disk.
        storageReservedGiB: 10
