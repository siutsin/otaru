{{- range $name, $node := .Values.nodes }}
---
apiVersion: longhorn.io/v1beta2
kind: Node
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
spec:
  allowScheduling: {{ $node.allowScheduling }}
  name: {{ $name }}
  disks:
    {{- range $diskId, $disk := $node.disks }}
    {{ $diskId }}:
      allowScheduling: {{ $disk.allowScheduling | default true }}
      diskType: filesystem
      evictionRequested: false
      path: {{ $disk.path }}
      storageReserved: {{ int $disk.storageReserved }}
      tags: []
    {{- end }}
{{- end }}