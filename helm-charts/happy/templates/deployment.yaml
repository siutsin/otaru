apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/version: {{ .Values.happyServer.packageVersion | quote }}
spec:
  replicas: {{ .Values.deployment.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.name }}
        app.kubernetes.io/version: {{ .Values.happyServer.packageVersion | quote }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      automountServiceAccountToken: false
      containers:
        - name: {{ .Values.name }}
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: NODE_ENV
              value: production
            - name: DB_PROVIDER
              value: pglite
            - name: DATA_DIR
              value: {{ .Values.persistence.mountPath | quote }}
            - name: PGLITE_DIR
              value: {{ printf "%s/pglite" .Values.persistence.mountPath | quote }}
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: {{ .Values.service.targetPort | quote }}
            - name: PUBLIC_URL
              value: {{ .Values.publicUrl | quote }}
            - name: HAPPY_INJECT_HTML_CONFIG
              value: {{ dict "serverUrl" .Values.publicUrl "disableAnalytics" true | toJson | quote }}
            - name: HANDY_MASTER_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ default .Values.name .Values.masterSecret.existingSecret }}
                  key: {{ .Values.masterSecret.key }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources: {{ toYaml .Values.deployment.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.claimName }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: {{ .Values.name }}
                topologyKey: kubernetes.io/hostname
