cert-manager:
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: volume
                operator: NotIn
                values:
                  - "true"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
      ephemeral-storage: 64Mi
    limits:
      memory: 128Mi
      ephemeral-storage: 64Mi
  cainjector:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
        ephemeral-storage: 64Mi
      limits:
        memory: 128Mi
        ephemeral-storage: 64Mi
  webhook:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
        ephemeral-storage: 64Mi
      limits:
        memory: 64Mi
        ephemeral-storage: 64Mi
  startupapicheck:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
        ephemeral-storage: 64Mi
      limits:
        memory: 64Mi
        ephemeral-storage: 64Mi
  enableCertificateOwnerRef: true
  installCRDs: true
