metadata:
  name: loki-canary
  namespace: {{ .Values.namespace }}
spec:
  action: ALLOW
  targetRefs:
    - group: ""
      kind: Service
      name: loki-canary
  rules:
    - from:
        - source:
            principals:
              - {{ $prometheusPrincipal }}
      to:
        - operation:
            ports:
              - "3500"
---
apiVersion: security.istio.io/v1
