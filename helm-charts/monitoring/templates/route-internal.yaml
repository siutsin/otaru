{{- $gateway := $.Values.gateway | default dict -}}
{{- $gatewayName := $gateway.name | default "gateway" -}}
{{- $gatewayNamespace := $gateway.namespace | default "gateway-api" -}}
{{- range $k, $v := .Values.httpRoutes }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $.Values.name }}-{{ $k }}-internal
  namespace: {{ $.Values.namespace }}
spec:
  hostnames:
    - {{ $k }}.internal.siutsin.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $gatewayName }}
      namespace: {{ $gatewayNamespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ $v.service.name }}
          port: {{ $v.service.port }}
          weight: 1
---
{{- end }}
