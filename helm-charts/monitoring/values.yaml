name: monitoring
namespace: monitoring

_shared:
  smallResources: &smallResources
    requests:
      cpu: 50m
      memory: 128Mi
      ephemeral-storage: 64Mi
    limits:
      memory: 128Mi
      ephemeral-storage: 64Mi

httpRoutes:
  prometheus:
    service:
      name: monitoring-prometheus-server
      port: 80
  victoriametrics:
    path: /select
    service:
      name: monitoring-vmselect
      port: 8481
  loki:
    service:
      name: monitoring-loki
      port: 3100
  grafana:
    service:
      name: monitoring-grafana
      port: 80

prometheus:
  configmapReload:
    prometheus:
      resources: *smallResources
  server:
    resources:
      # Keep memory at 3Gi: Grafana dashboard queries pushed Prometheus close to the previous 2Gi limit.
      requests:
        cpu: 100m
        memory: 3Gi
        ephemeral-storage: 256Mi
      limits:
        memory: 3Gi
        ephemeral-storage: 256Mi
    persistentVolume:
      size: 50Gi
    # One day currently uses about 2.3G; cap at 40GB on the 50Gi PVC to leave WAL/headroom and growth space.
    retentionSize: 40GB
    retention: 7d
  alertmanager:
    enabled: false
  kube-state-metrics:
    resources: *smallResources
  prometheus-node-exporter:
    resources: *smallResources
  prometheus-pushgateway:
    resources: *smallResources
  serverFiles:
    recording_rules.yml:
      groups:
        - name: workload-resource-usage
          interval: 30s
          rules:
            - record: namespace:workload_cpu_usage_cores:rate5m
              expr: |
                sum by (namespace) (
                  rate(container_cpu_usage_seconds_total{job="kubernetes-nodes-cadvisor", pod!="", container!="", container!="POD"}[5m])
                )
            - record: namespace:workload_memory_working_set_bytes:sum
              expr: |
                sum by (namespace) (
                  container_memory_working_set_bytes{job="kubernetes-nodes-cadvisor", pod!="", container!="", container!="POD"}
                )
            - record: pod:workload_cpu_usage_cores:rate5m
              expr: |
                sum by (namespace, pod) (
                  rate(container_cpu_usage_seconds_total{job="kubernetes-nodes-cadvisor", pod!="", container!="", container!="POD"}[5m])
                )
            - record: pod:workload_memory_working_set_bytes:sum
              expr: |
                sum by (namespace, pod) (
                  container_memory_working_set_bytes{job="kubernetes-nodes-cadvisor", pod!="", container!="", container!="POD"}
                )

victoria-metrics-cluster:
  vmselect:
    fullnameOverride: monitoring-vmselect
    replicaCount: 3
    extraArgs:
      dedup.minScrapeInterval: 30s
      replicationFactor: 2
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
        ephemeral-storage: 128Mi
      limits:
        memory: 256Mi
        ephemeral-storage: 128Mi
  vminsert:
    fullnameOverride: monitoring-vminsert
    replicaCount: 3
    extraArgs:
      replicationFactor: 2
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
        ephemeral-storage: 128Mi
      limits:
        memory: 256Mi
        ephemeral-storage: 128Mi
  vmstorage:
    fullnameOverride: monitoring-vmstorage
    replicaCount: 3
    retentionPeriod: 30d
    persistentVolume:
      size: 25Gi
    resources:
      requests:
        cpu: 100m
        memory: 1Gi
        ephemeral-storage: 256Mi
      limits:
        memory: 1Gi
        ephemeral-storage: 256Mi

victoria-metrics-agent:
  fullnameOverride: monitoring-vmagent
  replicaCount: 3
  mode: statefulSet
  statefulSet:
    clusterMode: true
    replicationFactor: 2
  remoteWrite:
    - url: http://monitoring-vminsert.monitoring.svc.cluster.local:8480/insert/0/prometheus/
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 256Mi
    limits:
      memory: 256Mi
      ephemeral-storage: 256Mi
  persistentVolume:
    enabled: true
    size: 2Gi
  config:
    # Scrape configs are inherited from victoria-metrics-agent 0.38.0 chart defaults.
    # Review rendered scrape_configs deliberately when changing the chart version.
    # Keep these timings aligned with vmselect dedup.minScrapeInterval above.
    global:
      scrape_interval: 30s
      scrape_timeout: 10s

victoria-metrics-alert:
  server:
    fullnameOverride: monitoring-vmalert
    # Recording-rules-only for now; add a notifier before introducing alerting rules.
    datasource:
      url: http://monitoring-vmselect.monitoring.svc.cluster.local:8481/select/0/prometheus/
    remoteWrite:
      url: http://monitoring-vminsert.monitoring.svc.cluster.local:8480/insert/0/prometheus/
    remoteRead:
      url: http://monitoring-vmselect.monitoring.svc.cluster.local:8481/select/0/prometheus/
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
        ephemeral-storage: 64Mi
      limits:
        memory: 128Mi
        ephemeral-storage: 64Mi
    config:
      # Duplicated from prometheus.serverFiles.recording_rules.yml while both stacks
      # run side-by-side; keep them in sync until Prometheus is removed.
      alerts:
        groups:
          - name: workload-resource-usage
            interval: 30s
            rules:
              - record: namespace:workload_cpu_usage_cores:rate5m
                expr: |
                  sum by (namespace) (
                    rate(container_cpu_usage_seconds_total{job="kubernetes-nodes-cadvisor", pod!="", container!="", container!="POD"}[5m])
                  )
              - record: namespace:workload_memory_working_set_bytes:sum
                expr: |
                  sum by (namespace) (
                    container_memory_working_set_bytes{job="kubernetes-nodes-cadvisor", pod!="", container!="", container!="POD"}
                  )
              - record: pod:workload_cpu_usage_cores:rate5m
                expr: |
                  sum by (namespace, pod) (
                    rate(container_cpu_usage_seconds_total{job="kubernetes-nodes-cadvisor", pod!="", container!="", container!="POD"}[5m])
                  )
              - record: pod:workload_memory_working_set_bytes:sum
                expr: |
                  sum by (namespace, pod) (
                    container_memory_working_set_bytes{job="kubernetes-nodes-cadvisor", pod!="", container!="", container!="POD"}
                  )

grafana:
  resources:
    # Keep memory at 512Mi: dashboard usage pushed Grafana against the 128Mi limit and caused probe failures.
    requests:
      cpu: 50m
      memory: 512Mi
      ephemeral-storage: 64Mi
    limits:
      memory: 512Mi
      ephemeral-storage: 64Mi
  admin:
    existingSecret: grafana
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://monitoring-prometheus-server.monitoring.svc.cluster.local
          isDefault: true
        - name: VictoriaMetrics
          type: prometheus
          url: http://monitoring-vmselect.monitoring.svc.cluster.local:8481/select/0/prometheus/
        - name: Loki
          type: loki
          url: http://monitoring-loki.monitoring.svc.cluster.local:3100
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          folder: ''
          allowUiUpdates: false
          options:
            path: /var/lib/grafana/dashboards
  grafana.ini:
    panels:
      disable_sanitize_html: true

loki:
  deploymentMode: SingleBinary
  lokiCanary:
    resources: *smallResources
  gateway:
    resources: *smallResources
  singleBinary:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 768Mi
        ephemeral-storage: 128Mi
      limits:
        memory: 768Mi
        ephemeral-storage: 128Mi
  minio:
    enabled: false
  chunksCache:
    enabled: false
  resultsCache:
    allocatedMemory: 128
    resources:
      requests:
        cpu: 100m
        memory: 154Mi
        ephemeral-storage: 64Mi
      limits:
        memory: 154Mi
        ephemeral-storage: 64Mi
  memcachedExporter:
    resources: *smallResources
  sidecar:
    resources: *smallResources
  memberlist:
    service:
      publishNotReadyAddresses: true
  loki:
    commonConfig:
      replication_factor: 1
    auth_enabled: false
    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    compactor:
      working_directory: /var/loki/compactor
      retention_enabled: true
      retention_delete_delay: 1h
      delete_request_store: filesystem
    pattern_ingester:
      enabled: true
    limits_config:
      retention_period: 7d
      allow_structured_metadata: true
      volume_enabled: true
    rulerConfig:
      enable_api: true
    storage:
      type: filesystem

  # Zero-out replica counts of other deployment modes
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  ingester:
    replicas: 0
  querier:
    replicas: 0
  queryFrontend:
    replicas: 0
  queryScheduler:
    replicas: 0
  distributor:
    replicas: 0
  compactor:
    replicas: 0
  indexGateway:
    replicas: 0
  bloomGateway:
    replicas: 0

fluent-bit:
  resources: *smallResources
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
    - key: node-role.kubernetes.io/master
      operator: Exists
  config:
    inputs: |
      [INPUT]
          Name tail
          Path /var/log/containers/*.log
          DB /var/log/fluent-bit-tail.db
          multiline.parser docker, cri
          Tag kube.*
          Mem_Buf_Limit 5MB
          Skip_Long_Lines On

    filters: |
      [FILTER]
          Name kubernetes
          Match kube.*
          Merge_Log On
          Keep_Log Off
          K8S-Logging.Parser On
          K8S-Logging.Exclude On
          buffer_size 128k

    outputs: |
      [OUTPUT]
          Name loki
          Match kube.*
          Host monitoring-loki
          Port 3100
          URI /loki/api/v1/push
          Labels job=fluent-bit
          Label_Map_Path /fluent-bit/etc/conf/loki-labels.json
          buffer_size 1M
          Retry_Limit False

    extraFiles:
      loki-labels.json: |
        {
          "kubernetes": {
            "namespace_name": "namespace",
            "pod_name": "pod",
            "container_name": "container",
            "host": "node"
          },
          "stream": "stream"
        }
