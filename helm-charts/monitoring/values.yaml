name: monitoring
namespace: monitoring

# Longhorn Volume CR for the dynamically provisioned Prometheus PVC (name = bound PV).
# Lookup: kubectl -n monitoring get pvc monitoring-prometheus-server -o jsonpath='{.spec.volumeName}'
prometheusLonghornVolume:
  enabled: true
  name: pvc-429394f8-4469-42bd-913a-9952629d36d1
  numberOfReplicas: 2

# Lookup: kubectl -n monitoring get pvc storage-monitoring-loki-0 -o jsonpath='{.spec.volumeName}'
lokiLonghornVolume:
  enabled: true
  name: pvc-40c3f449-86c7-4d7f-83ec-0912076a2d7b
  numberOfReplicas: 2

_shared:
  smallResources: &smallResources
    requests:
      cpu: 50m
      memory: 128Mi
      ephemeral-storage: 64Mi
    limits:
      memory: 128Mi
      ephemeral-storage: 64Mi

httpRoutes:
  prometheus:
    service:
      name: monitoring-prometheus-server
      port: 80
  loki:
    service:
      name: monitoring-loki
      port: 3100
  grafana:
    service:
      name: monitoring-grafana
      port: 80

prometheus:
  scrapeConfigFiles:
    - /etc/prometheus/secrets/blackbox/blackbox-scrape-config.yml
  extraScrapeConfigs: |
    - job_name: k8s-ephemeral-storage-metrics
      static_configs:
        - targets:
            - k8s-ephemeral-storage-metrics.monitoring.svc.cluster.local:9100
  configmapReload:
    prometheus:
      resources: *smallResources
  server:
    deploymentAnnotations:
      secret.reloader.stakater.com/reload: blackbox-scrape-config
    resources:
      # KRR 2026-07-05: live peak ~3.16Gi working set; prior 3Gi bump (#2309) was still ~40Mi short.
      requests:
        cpu: 800m
        memory: 3264Mi
        ephemeral-storage: 256Mi
      limits:
        memory: 3264Mi
        ephemeral-storage: 256Mi
    persistentVolume:
      size: 100Gi
      labels:
        recurring-job-group.longhorn.io/backup: enabled
        recurring-job-group.longhorn.io/trim: enabled
    # Live 2026-07-05: ~8.3GiB on disk at 7d retention (~1.2GiB/day). 30d ≈ 36GiB TSDB; 100GB cap matches PVC budget.
    retentionSize: 100GB
    retention: 30d
    extraSecretMounts:
      - name: blackbox-scrape-config
        mountPath: /etc/prometheus/secrets/blackbox
        secretName: blackbox-scrape-config
        readOnly: true
  alertmanager:
    enabled: true
    resources: *smallResources
    persistence:
      enabled: true
      size: 1Gi
    config:
      enabled: false
    extraArgs:
      config.file: /etc/secrets/alertmanager/alertmanager.yml
    extraSecretMounts:
      - name: alertmanager-config
        mountPath: /etc/secrets/alertmanager
        secretName: alertmanager-telegram-config
        readOnly: true
    extraVolumes:
      - name: alertmanager-telegram-templates
        configMap:
          name: alertmanager-telegram-templates
    extraVolumeMounts:
      - name: alertmanager-telegram-templates
        mountPath: /etc/alertmanager/templates
        readOnly: true
  kube-state-metrics:
    resources: *smallResources
  prometheus-node-exporter:
    resources: *smallResources
  prometheus-pushgateway:
    resources: *smallResources
  serverFiles:
    recording_rules.yml:
      groups:
        - name: workload-resource-usage
          interval: 30s
          rules:
            - record: namespace:workload_cpu_usage_cores:rate5m
              expr: |
                sum by (namespace) (
                  rate(container_cpu_usage_seconds_total{job="kubernetes-nodes-cadvisor", pod!="", container!="", container!="POD"}[5m])
                )
            - record: namespace:workload_memory_working_set_bytes:sum
              expr: |
                sum by (namespace) (
                  container_memory_working_set_bytes{job="kubernetes-nodes-cadvisor", pod!="", container!="", container!="POD"}
                )
            - record: pod:workload_cpu_usage_cores:rate5m
              expr: |
                sum by (namespace, pod) (
                  rate(container_cpu_usage_seconds_total{job="kubernetes-nodes-cadvisor", pod!="", container!="", container!="POD"}[5m])
                )
            - record: pod:workload_memory_working_set_bytes:sum
              expr: |
                sum by (namespace, pod) (
                  container_memory_working_set_bytes{job="kubernetes-nodes-cadvisor", pod!="", container!="", container!="POD"}
                )
    alerting_rules.yml:
      groups:
        - name: cluster-health
          rules:
            - alert: DeploymentUnavailable
              expr: kube_deployment_status_replicas_unavailable > 0
              for: 10m
              labels:
                severity: warning
              annotations:
                title: Deployment has unavailable replicas
                summary: "{{ $labels.deployment }} in {{ $labels.namespace }}"
                description: "{{ $value | humanize }} replica(s) have been unavailable for over 10 minutes. Check pod status and events."
            - alert: PodNotReady
              expr: kube_pod_status_ready{condition="true"} == 0 and on(namespace, pod) kube_pod_status_phase{phase="Running"} == 1
              for: 15m
              labels:
                severity: warning
              annotations:
                title: Pod stuck not ready
                summary: "{{ $labels.pod }} in {{ $labels.namespace }}"
                description: "The pod is running but failing readiness checks for over 15 minutes. Check container logs and probe settings."
            - alert: ScrapeTargetDown
              expr: up == 0
              for: 10m
              labels:
                severity: warning
              annotations:
                title: Metrics scrape failing
                summary: "{{ $labels.job }} — {{ $labels.instance }}"
                description: "Prometheus has been unable to collect metrics from this target for over 10 minutes."
            - alert: NodeNotReady
              expr: kube_node_status_condition{condition="Ready",status="true"} == 0
              for: 5m
              labels:
                severity: critical
              annotations:
                title: Cluster node not ready
                summary: "{{ $labels.node }}"
                description: "This node has been NotReady for over 5 minutes. Workloads on it may be evicted."
            - alert: CertificateExpiringSoon
              expr: (certmanager_certificate_expiration_timestamp_seconds - time()) < 7 * 24 * 3600
              for: 1h
              labels:
                severity: warning
              annotations:
                title: TLS certificate expiring soon
                summary: "{{ $labels.name }} in {{ $labels.namespace }}"
                description: "This certificate expires in less than 7 days. Plan renewal before it lapses."
            - alert: BlackboxProbeFailed
              expr: probe_success{job="blackbox-https"} == 0
              for: 5m
              labels:
                severity: warning
              annotations:
                title: External endpoint health check failing
                summary: "{{ $labels.instance }}"
                description: "The HTTPS health probe has failed for over 5 minutes. Check the service, ingress, and TLS."

prometheus-blackbox-exporter:
  fullnameOverride: blackbox
  resources: *smallResources

k8s-ephemeral-storage-metrics:
  deploy_type: Deployment
  pod_labels:
    istio.io/dataplane-mode: none
  prometheus:
    enable: true
    rules:
      enable: false
  serviceMonitor:
    enable: false
  image:
    repository: ghcr.io/jmcgrath207/k8s-ephemeral-storage-metrics
    tag: 1.20.0@sha256:b1e0db4cc844eada588972656b0bd9a2594718f200b2f27de30631ff63457c19
    imagePullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
      ephemeral-storage: 64Mi
    limits:
      memory: 128Mi
      ephemeral-storage: 64Mi

grafana:
  resources:
    # Keep memory at 512Mi: dashboard usage pushed Grafana against the 128Mi limit and caused probe failures.
    # ephemeral-storage 2026-07-06: 14d peak ~50Mi against a 64Mi limit (80.6% via ephemeral_storage_container_limit_percentage) — bump to 128Mi for headroom.
    requests:
      cpu: 50m
      memory: 512Mi
      ephemeral-storage: 128Mi
    limits:
      memory: 512Mi
      ephemeral-storage: 128Mi
  downloadDashboards:
    resources: *smallResources
  initChownData:
    resources: *smallResources
  admin:
    existingSecret: grafana
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://monitoring-prometheus-server.monitoring.svc.cluster.local
          isDefault: true
        - name: Loki
          type: loki
          url: http://monitoring-loki.monitoring.svc.cluster.local:3100
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          folder: ''
          allowUiUpdates: false
          options:
            path: /var/lib/grafana/dashboards
  grafana.ini:
    panels:
      disable_sanitize_html: true

loki:
  deploymentMode: SingleBinary
  lokiCanary:
    podLabels:
      # loki-canary performs direct Loki health checks and should not be intercepted by ambient mesh.
      istio.io/dataplane-mode: none
    resources: *smallResources
  gateway:
    resources: *smallResources
  singleBinary:
    replicas: 1
    podLabels:
      # Loki is written to directly by non-ambient fluent-bit; keep ingestion off the ambient dataplane.
      istio.io/dataplane-mode: none
    resources:
      # KRR 2026-07-05: live peak ~583Mi working set; 512Mi request (#2567) left ~70Mi headroom.
      requests:
        cpu: 100m
        memory: 608Mi
        ephemeral-storage: 128Mi
      limits:
        memory: 608Mi
        ephemeral-storage: 128Mi
  minio:
    enabled: false
  chunksCache:
    enabled: false
  resultsCache:
    allocatedMemory: 128
    resources:
      # KRR 2026-07-05: live peak ~100Mi working set; 154Mi request was never approached.
      requests:
        cpu: 100m
        memory: 128Mi
        ephemeral-storage: 64Mi
      limits:
        memory: 128Mi
        ephemeral-storage: 64Mi
  memcachedExporter:
    resources: *smallResources
  sidecar:
    resources: *smallResources
  memberlist:
    service:
      publishNotReadyAddresses: true
  loki:
    commonConfig:
      replication_factor: 1
    auth_enabled: false
    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    compactor:
      working_directory: /var/loki/compactor
      retention_enabled: true
      retention_delete_delay: 1h
      delete_request_store: filesystem
    pattern_ingester:
      enabled: true
    limits_config:
      retention_period: 7d
      allow_structured_metadata: true
      volume_enabled: true
    rulerConfig:
      enable_api: true
    storage:
      type: filesystem

  # Zero-out replica counts of other deployment modes
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  ingester:
    replicas: 0
  querier:
    replicas: 0
  queryFrontend:
    replicas: 0
  queryScheduler:
    replicas: 0
  distributor:
    replicas: 0
  compactor:
    replicas: 0
  indexGateway:
    replicas: 0
  bloomGateway:
    replicas: 0

fluent-bit:
  podLabels:
    # fluent-bit runs host log collection on every node; keep host-facing log shipping outside ambient mesh interception.
    istio.io/dataplane-mode: none
  initContainers:
    - name: remove-legacy-tail-db
      image: busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
      command:
        - rm
        - -f
        - /var/log/fluent-bit-tail.db
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
          ephemeral-storage: 16Mi
        limits:
          memory: 16Mi
          ephemeral-storage: 16Mi
      volumeMounts:
        - name: varlog
          mountPath: /var/log
  extraVolumes:
    - name: fluent-bit-state
      emptyDir:
        sizeLimit: 64Mi
  extraVolumeMounts:
    - name: fluent-bit-state
      mountPath: /var/fluent-bit-state
  resources: *smallResources
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
    - key: node-role.kubernetes.io/master
      operator: Exists
  config:
    inputs: |
      [INPUT]
          Name tail
          Path /var/log/containers/*.log
          DB /var/fluent-bit-state/fluent-bit-tail.db
          multiline.parser docker, cri
          Tag kube.*
          Mem_Buf_Limit 5MB
          Skip_Long_Lines On

    filters: |
      [FILTER]
          Name kubernetes
          Match kube.*
          Merge_Log On
          Keep_Log Off
          K8S-Logging.Parser On
          K8S-Logging.Exclude On
          buffer_size 128k

    outputs: |
      [OUTPUT]
          Name loki
          Match kube.*
          Host monitoring-loki
          Port 3100
          URI /loki/api/v1/push
          Labels job=fluent-bit
          Label_Map_Path /fluent-bit/etc/conf/loki-labels.json
          buffer_size 1M
          Retry_Limit 5

    extraFiles:
      loki-labels.json: |
        {
          "kubernetes": {
            "namespace_name": "namespace",
            "pod_name": "pod",
            "container_name": "container",
            "host": "node"
          },
          "stream": "stream"
        }
