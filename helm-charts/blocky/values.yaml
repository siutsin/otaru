name: blocky
namespace: blocky
ip: 192.168.10.51

app:
  timezone: Europe/London

deployment:
  image:
    repository: ghcr.io/0xerr0r/blocky
    tag: v0.28.1@sha256:e9af552da2b0849f9b3b48ae3169acb2696fdf0ddc65df52e4025c9deef04a60
  probeExec:
    command:
      - /app/blocky
      - healthcheck
  ports:
    http: 4000
  resources:
    # 2026-07-20: OOMKilled (exit 137) at 512Mi after adding a second denylist
    # group ("malware", HaGeZi TIF + URLhaus) alongside the existing "ads"
    # group -- concurrent import/parse of both groups spikes higher than a
    # single group did. Bumped to 768Mi for headroom.
    requests:
      cpu: 100m
      memory: 768Mi
      ephemeral-storage: 100Mi
    limits:
      memory: 768Mi
      ephemeral-storage: 100Mi

hpa:
  autoscaling:
    min: 2
    max: 3
