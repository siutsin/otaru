apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.deployment.ports.http }}
      targetPort: {{ .Values.deployment.ports.http }}
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ .Values.name }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}-dns
  namespace: {{ .Values.namespace }}
  labels:
    # Plain DNS is L4 UDP/TCP, not HTTP. Keep this Service off the shared
    # waypoint so Envoy's DNS routes hit Blocky endpoints directly instead of
    # the L7 waypoint path used by the HTTP DoH/metrics Service.
    istio.io/use-waypoint: none
spec:
  selector:
    app.kubernetes.io/name: {{ .Values.name }}
  type: ClusterIP
  ports:
    - name: dns-tcp
      protocol: TCP
      port: 53
      targetPort: 53
    - name: dns-udp
      protocol: UDP
      port: 53
      targetPort: 53
