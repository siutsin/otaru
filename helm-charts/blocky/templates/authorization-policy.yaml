{{- $gateway := .Values.gateway | default dict -}}
{{- $gatewayName := $gateway.name | default "gateway" -}}
{{- $gatewayNamespace := $gateway.namespace | default "gateway" -}}
{{- $monitoring := .Values.monitoring | default dict -}}
{{- $prometheusServiceAccount := $monitoring.prometheusServiceAccount | default "monitoring-prometheus-server" -}}
{{- $prometheusNamespace := $monitoring.namespace | default "monitoring" -}}
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
spec:
  action: ALLOW
  targetRefs:
    - group: ""
      kind: Service
      name: {{ .Values.name }}
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/{{ $gatewayNamespace }}/sa/{{ $gatewayName }}
      to:
        - operation:
            methods:
              - GET
              - POST
            paths:
              - /dns-query
            ports:
              - {{ .Values.deployment.ports.http | quote }}
    - from:
        - source:
            principals:
              - cluster.local/ns/{{ $prometheusNamespace }}/sa/{{ $prometheusServiceAccount }}
      to:
        - operation:
            methods:
              - GET
            paths:
              - /metrics
            ports:
              - {{ .Values.deployment.ports.http | quote }}
---
# Istio AuthorizationPolicy only applies to the TCP side of this DNS Service;
# UDPRoute traffic is not proxied by Istio and must be controlled outside AP.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ .Values.name }}-dns
  namespace: {{ .Values.namespace }}
spec:
  action: ALLOW
  targetRefs:
    - group: ""
      kind: Service
      name: {{ .Values.name }}-dns
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/{{ $gatewayNamespace }}/sa/{{ $gatewayName }}
      to:
        - operation:
            ports:
              - "53"
