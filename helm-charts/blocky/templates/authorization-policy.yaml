{{- $gateway := .Values.gateway | default dict -}}
{{- $gatewayName := $gateway.name | default "gateway" -}}
{{- $gatewayNamespace := $gateway.namespace | default "gateway" -}}
{{- $monitoring := .Values.monitoring | default dict -}}
{{- $prometheusServiceAccount := $monitoring.prometheusServiceAccount | default "monitoring-prometheus-server" -}}
{{- $prometheusNamespace := $monitoring.namespace | default "monitoring" -}}
{{- $heartbeatPrincipal := "cluster.local/ns/heartbeats-operator-system/sa/heartbeats-operator-controller-manager" -}}
{{- $waypointPrincipal := "cluster.local/ns/istio-waypoints/sa/waypoint" -}}
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
spec:
  action: ALLOW
  targetRefs:
    - group: ""
      kind: Service
      name: {{ .Values.name }}
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/{{ $gatewayNamespace }}/sa/{{ $gatewayName }}
      to:
        - operation:
            methods:
              - GET
              - POST
            paths:
              - /dns-query
            ports:
              - {{ .Values.deployment.ports.http | quote }}
    - from:
        - source:
            principals:
              - cluster.local/ns/{{ $prometheusNamespace }}/sa/{{ $prometheusServiceAccount }}
              - {{ $heartbeatPrincipal }}
              - {{ $waypointPrincipal }}
      to:
        - operation:
            methods:
              - GET
            paths:
              - /metrics
            ports:
              - {{ .Values.deployment.ports.http | quote }}
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ .Values.name }}-dns
  namespace: {{ .Values.namespace }}
spec:
  action: ALLOW
  targetRefs:
    - group: ""
      kind: Service
      name: {{ .Values.name }}-dns
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/{{ $gatewayNamespace }}/sa/{{ $gatewayName }}
      to:
        - operation:
            ports:
              - "53"
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ .Values.name }}-workload
  namespace: {{ .Values.namespace }}
spec:
  action: ALLOW
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.name }}
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/{{ $gatewayNamespace }}/sa/{{ $gatewayName }}
      to:
        - operation:
            ports:
              - "53"
              - {{ .Values.deployment.ports.http | quote }}
    - from:
        - source:
            principals:
              - cluster.local/ns/{{ $prometheusNamespace }}/sa/{{ $prometheusServiceAccount }}
              - {{ $heartbeatPrincipal }}
              - {{ $waypointPrincipal }}
      to:
        - operation:
            ports:
              - {{ .Values.deployment.ports.http | quote }}
