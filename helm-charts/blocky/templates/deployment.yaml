{{- $version := regexReplaceAll "@sha256:.*$" .Values.deployment.image.tag "" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/version: {{ $version | quote }}
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.name }}
        app.kubernetes.io/version: {{ $version | quote }}
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: {{ .Values.deployment.ports.http | quote }}
        prometheus.io/scrape: "true"
        # 2026-07-20: descheduler's "consolidate" HighNodeUtilization strategy
        # repeatedly evicted blocky from raspberrypi-00 every ~5 minutes --
        # it is the only node under the 90% memory threshold while the other
        # four sit at 98-100%, so the evicted pod has nowhere else to fit and
        # reschedules straight back, causing a disruptive no-op loop (~40-50s
        # of reduced capacity per cycle, protected only by the PDB's
        # maxUnavailable: 1). Opt this DNS-critical, disruption-sensitive
        # workload out of all descheduler strategies rather than tuning the
        # shared cluster-wide policy.
        descheduler.alpha.kubernetes.io/evict: "false"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - {{ .Values.name }}
                topologyKey: kubernetes.io/hostname
      securityContext:
        fsGroup: 100
      automountServiceAccountToken: false
      containers:
        - name: {{ .Values.name }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 100
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              # blocky's binary carries a cap_net_bind_service file capability so it
              # can bind DNS port 53 as uid 100; verified locally that dropping this
              # too makes `exec /app/blocky` fail with "operation not permitted".
              add:
                - NET_BIND_SERVICE
          image: {{ .Values.deployment.image.repository }}:{{ .Values.deployment.image.tag }}
          ports:
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: http
              containerPort: {{ .Values.deployment.ports.http }}
              protocol: TCP
          env:
            - name: TZ
              value: {{ .Values.app.timezone }}
          livenessProbe:
            exec: {{ toYaml .Values.deployment.probeExec | nindent 14 }}
          readinessProbe:
            exec: {{ toYaml .Values.deployment.probeExec | nindent 14 }}
          startupProbe:
            exec: {{ toYaml .Values.deployment.probeExec | nindent 14 }}
            failureThreshold: 120
            periodSeconds: 5
          volumeMounts:
            - name: {{ .Values.name }}-config
              mountPath: /app/config.yml
              subPath: config.yml
          resources: {{ toYaml .Values.deployment.resources | nindent 12 }}
      volumes:
        - name: {{ .Values.name }}-config
          secret:
            secretName: {{ .Values.name }}-config
