_shared:
  resources: &resources
    requests:
      cpu: 50m
      memory: 64Mi
      ephemeral-storage: 64Mi
    limits:
      memory: 64Mi
      ephemeral-storage: 64Mi
  preferredPodAntiAffinity: &preferredPodAntiAffinity
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname

connect:
  connect:
    connectApiResources: *resources
    connectSyncResources: *resources
    affinity:
      <<: *preferredPodAntiAffinity
  operator:
    affinity:
      <<: *preferredPodAntiAffinity
