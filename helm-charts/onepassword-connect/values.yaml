_shared:
  resources: &resources
    requests:
      cpu: 50m
      memory: 64Mi
      ephemeral-storage: 64Mi
    limits:
      cpu: ~
      memory: 64Mi
      ephemeral-storage: 64Mi

connect:
  connect:
    connectApiResources: *resources
    connectSyncResources: *resources
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: volume
                  operator: NotIn
                  values:
                    - "true"
