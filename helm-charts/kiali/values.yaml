name: kiali
namespace: kiali

kiali-server:
  auth:
    strategy: anonymous
  login_token:
    # Stable non-secret value to keep Helm renders deterministic for anonymous read-only Kiali.
    signing_key: "public-anonymous-readonly-stable-signing-key"
  deployment:
    accessible_namespaces:
      - "**"
    view_only_mode: true
    resources:
      # KRR 2026-07-05: live peak ~124Mi working set; 256Mi request was ~2x actual usage.
      requests:
        cpu: 50m
        memory: 160Mi
        ephemeral-storage: 64Mi
      limits:
        memory: 160Mi
        ephemeral-storage: 64Mi
  external_services:
    grafana:
      enabled: true
      internal_url: http://monitoring-grafana.monitoring.svc.cluster.local
      external_url: https://grafana.internal.siutsin.com
    istio:
      gateway_api_classes:
        - name: Envoy Gateway
          class_name: eg
      root_namespace: istio-system
    prometheus:
      url: http://monitoring-prometheus-server.monitoring.svc.cluster.local
