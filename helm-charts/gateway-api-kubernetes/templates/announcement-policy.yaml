apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.metallbNamespace }}
spec:
  ipAddressPools:
    - {{ .Values.name }}
  nodeSelectors:
    - matchExpressions:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
  interfaces:
    {{- toYaml .Values.l2AnnouncementPolicy.interface | nindent 4 }}
