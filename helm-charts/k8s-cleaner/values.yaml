namespace: k8s-cleaner

excludeNamespaces: &excludeNamespaces
  - cilium
  - cilium-gateway
  - kube-system
  - longhorn-system

repave:
  maxAgeSeconds: 259200
  excludeNamespaces: *excludeNamespaces

failedPods:
  excludeNamespaces: *excludeNamespaces

k8s-cleaner:
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: volume
                operator: NotIn
                values:
                  - "true"
