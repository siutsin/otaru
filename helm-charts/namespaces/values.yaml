labels:
  istio.io/dataplane-mode: ambient

ambientLabelExclusions:
  # Admission webhook services must remain reachable from the Kubernetes API
  # server, which is outside the mesh and cannot use Istio mTLS.
  - cert-manager
  - cnpg-system
  - default
  - external-secrets
  - istio-system
  - keda
  - kyverno
  - metallb-system

namespaces:
  # Intentional: managed workload namespaces are enrolled in ambient mesh so
  # mTLS can be observed in PERMISSIVE mode before tightening enforcement.
  - argocd
  - atlantis
  - blocky
  - cert-manager
  - changedetection
  - cloudflare-tunnel
  - cnpg-system
  - cyberchef
  - default
  - descheduler
  - excalidraw
  - external-secrets
  - gateway-api
  - heartbeats-operator-system
  - home-assistant
  - httpbin
  - istio-system
  - jellyfin
  - jsoncrack
  - jung2bot
  - jung2bot-dev
  - k3s-apiserver-loadbalancer-system
  - k8s-cleaner
  - keda
  - kube-system
  - kubernetes-mcp-server
  - kyverno
  - longhorn-system
  - metallb-system
  - monitoring
  - onepassword
  - reloader
  - teslamate
