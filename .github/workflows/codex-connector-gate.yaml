name: Codex Connector Gate

on:
  pull_request:

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  check-files:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      should-review: ${{ steps.check.outputs.should-review }}
    steps:
      - name: Check if review is needed
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          if echo "$PR_AUTHOR" | grep -q '\[bot\]$'; then
            echo "should-review=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          FILES=$(gh api "$PR_URL/files" --paginate --jq '.[].filename')
          FILE_COUNT=$(echo "$FILES" | grep -c . || true)
          if [ "$FILE_COUNT" = "1" ] && echo "$FILES" | grep -qx '.github/workflows/codex-connector-gate.yaml'; then
            echo "should-review=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if echo "$FILES" | grep -q .; then
            echo "should-review=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-review=false" >> "$GITHUB_OUTPUT"
          fi

  codex-connector-gate:
    needs: check-files
    if: needs.check-files.outputs.should-review == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Codex connector review
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const headSha = context.payload.pull_request.head.sha;
            const updatedAt = new Date(context.payload.pull_request.updated_at);
            const botLogins = new Set([
              "chatgpt-codex-connector[bot]",
              "chatgpt-codex-connector",
            ]);

            const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
            const deadline = Date.now() + 20 * 60 * 1000;

            while (Date.now() < deadline) {
              const reviews = await github.paginate(
                github.rest.pulls.listReviews,
                { owner, repo, pull_number, per_page: 100 }
              );

              const reviewedHead = reviews.some(review =>
                botLogins.has(review.user?.login) &&
                review.commit_id === headSha
              );

              if (reviewedHead) {
                core.info(`Codex reviewed HEAD ${headSha}`);
                return;
              }

              const reactions = await github.paginate(
                github.rest.reactions.listForIssue,
                { owner, repo, issue_number: pull_number, per_page: 100 }
              );

              const thumbsUpAfterUpdate = reactions.some(reaction =>
                botLogins.has(reaction.user?.login) &&
                reaction.content === "+1" &&
                new Date(reaction.created_at) >= updatedAt
              );

              if (thumbsUpAfterUpdate) {
                core.info("Codex gave 👍 after latest PR update");
                return;
              }

              core.info("Waiting for Codex connector review or 👍...");
              await sleep(60 * 1000);
            }

            core.setFailed("Timed out waiting for Codex connector review signal.");

  codex-connector-status:
    if: always()
    needs:
      - check-files
      - codex-connector-gate
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Check Codex connector gate result
        env:
          CHECK_FILES_RESULT: ${{ needs.check-files.result }}
          GATE_RESULT: ${{ needs.codex-connector-gate.result }}
        run: |
          if [ "$CHECK_FILES_RESULT" = "failure" ] || [ "$CHECK_FILES_RESULT" = "cancelled" ]; then
            exit 1
          fi
          if [ "$GATE_RESULT" = "failure" ] || [ "$GATE_RESULT" = "cancelled" ]; then
            exit 1
          fi
