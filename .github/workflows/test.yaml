name: Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Setup yq
        uses: vegardit/gha-setup-yq@95fc563100306ca9918e9d18f38e85430ba285bc # 1.1.1

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: '3.18.4' # Pending on bugfix: https://github.com/helm/helm/issues/31148

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2
        with:
          tofu_version: '1.12.0'

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@aefb0a43c4f5503a91fefb307745c4d51c26ed0e # v3
        with:
          terragrunt-version: latest
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install zizmor
        run: pip install zizmor

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable

      - name: Install go-jsonnet
        run: go install github.com/google/go-jsonnet/cmd/jsonnet@latest

      - name: Update Helm dependencies
        run: make update-helm-deps

      - name: Run tests
        run: make test
