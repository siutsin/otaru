name: Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'

      - name: Install markdownlint-cli2
        run: npm ci

      - name: Add node_modules/.bin to PATH
        run: echo "${GITHUB_WORKSPACE}/node_modules/.bin" >> "${GITHUB_PATH}"

      - name: Setup yq
        uses: vegardit/gha-setup-yq@95fc563100306ca9918e9d18f38e85430ba285bc # 1.1.1

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: '4.2.2'

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2
        with:
          tofu_version: '1.12.0'

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@aefb0a43c4f5503a91fefb307745c4d51c26ed0e # v3
        with:
          terragrunt-version: latest
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install editorconfig-checker
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download v3.6.1 --repo editorconfig-checker/editorconfig-checker --pattern 'ec-linux-amd64.tar.gz' --output /tmp/ec.tar.gz
          tar -xzf /tmp/ec.tar.gz -C /tmp bin/ec-linux-amd64
          chmod +x /tmp/bin/ec-linux-amd64
          sudo mv /tmp/bin/ec-linux-amd64 /usr/local/bin/ec

      - name: Install zizmor
        run: pip install zizmor

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable

      - name: Install go-jsonnet
        run: go install github.com/google/go-jsonnet/cmd/jsonnet@latest

      - name: Update Helm dependencies
        run: make update-helm-deps

      - name: Run tests
        run: make test
