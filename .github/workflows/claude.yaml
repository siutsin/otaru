name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

permissions: {}

jobs:
  check-files:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      should-review: ${{ steps.check.outputs.should-review }}
    steps:
      - name: Check if review is needed
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.url }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ "$ACTOR" = "renovate[bot]" ] || [ "$ACTOR" = "otaru-ci[bot]" ]; then
            echo "should-review=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          FILES=$(gh api "$PR_URL/files" --paginate --jq '.[].filename')
          if echo "$FILES" | grep -qvx '.github/workflows/claude.yaml'; then
            echo "should-review=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-review=false" >> "$GITHUB_OUTPUT"
          fi

  claude:
    needs: check-files
    if: |
      always() &&
      ((github.event_name == 'pull_request' && needs.check-files.outputs.should-review == 'true') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@claude') ||
        contains(github.event.issue.title, '@claude'))))
    runs-on: ubuntu-latest
    environment: automation
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@88c168b39e7e64da0286d812b6e9fbebb6708185 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          claude_args: |
            --model opus --allowedTools "Bash(make:*),Bash(gh pr edit:*),Bash(gh pr view:*),Bash(gh pr diff:*)"
          prompt: |
            If the PR title or description does not meaningfully describe the changes, update them.
            Use conventional commit style for the title, under 72 characters.
            Keep the description short with bullet points summarising the changes.

            Review the PR changes with focus on:
            1. Code quality, readability, and best practices
            2. Security vulnerabilities
            3. Potential bugs or edge cases
            4. Configuration correctness (Helm, Terraform, YAML)

            Skip auto-generated files (CRDs, dashboard JSON, lock files).
            Keep output short and concise. Use bullet points where possible.
            Only comment on issues worth fixing. Skip praise and nitpicks.

  claude-status:
    if: always()
    needs: claude
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Check claude result
        env:
          CLAUDE_RESULT: ${{ needs.claude.result }}
        run: |
          if [ "$CLAUDE_RESULT" = "failure" ] || [ "$CLAUDE_RESULT" = "cancelled" ]; then
            exit 1
          fi
