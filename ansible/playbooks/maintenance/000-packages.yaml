---
# First play: Update packages on all Kubernetes nodes in parallel
- hosts: k3s_cluster
  become: true

  tasks:
    - include_tasks: ../rpi/package/apt.yaml
    - include_tasks: ../rpi/package/asdf.yaml
    - include_tasks: ../rpi/package/snap.yaml
    - include_tasks: ../rpi/package/binary.yaml

# Second play: Reboot Kubernetes nodes one by one
- hosts: k3s_cluster
  become: true
  serial: 1

  tasks:
    - name: Get node name by removing .local from inventory_hostname
      set_fact:
        node_name: "{{ inventory_hostname | regex_replace('\\.local$', '') }}"

    - name: Check if reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required_marker

    - name: Node reboot not required
      debug:
        msg: "Skipping {{ node_name }} because /var/run/reboot-required is absent."
      when: not reboot_required_marker.stat.exists

    - name: Assert LUKS reboot passphrase is provided locally
      delegate_to: localhost
      become: false
      assert:
        that:
          - lookup('ansible.builtin.env', 'OTARU_LUKS_PASSWORD') | length > 0
        fail_msg: "Set OTARU_LUKS_PASSWORD in the controller environment before rebooting a LUKS node."
      when:
        - reboot_required_marker.stat.exists
        - luks_enabled | default(false)

    - name: Exclude node from external load balancer candidates
      delegate_to: localhost
      become: false
      shell: KUBECONFIG="${KUBECONFIG:-$HOME/.kube/config}" kubectl label node {{ node_name }} node.kubernetes.io/exclude-from-external-load-balancers=true --overwrite
      changed_when: false
      when: reboot_required_marker.stat.exists

    - name: Wait for Kubernetes API VIP to move off the node
      delegate_to: localhost
      become: false
      shell: |
        KUBECONFIG="${KUBECONFIG:-$HOME/.kube/config}" kubectl -n metallb-system get servicel2statuses.metallb.io -o json \
          | jq -e --arg node {{ node_name | quote }} '
              [.items[] | select(.status.serviceName == "kubernetes" and .status.serviceNamespace == "default")] as $statuses
              | ($statuses | length > 0) and all($statuses[]; .status.node != $node)
            '
      changed_when: false
      register: api_vip_move_result
      retries: 12
      delay: 5
      until: api_vip_move_result.rc == 0
      when: reboot_required_marker.stat.exists

    - name: Cordon the node
      delegate_to: localhost
      become: false
      shell: KUBECONFIG="${KUBECONFIG:-$HOME/.kube/config}" kubectl cordon {{ node_name }}
      changed_when: false
      when: reboot_required_marker.stat.exists

    - name: Drain the node, ignoring PDBs
      delegate_to: localhost
      become: false
      shell: KUBECONFIG="${KUBECONFIG:-$HOME/.kube/config}" kubectl drain {{ node_name }} --ignore-daemonsets --force --delete-emptydir-data --disable-eviction
      register: drain_result
      changed_when: false
      retries: 5
      delay: 30
      until: drain_result.rc == 0
      when: reboot_required_marker.stat.exists

    - name: Reboot the system
      reboot:
        reboot_command: systemctl reboot --job-mode=replace-irreversibly
      when:
        - reboot_required_marker.stat.exists
        - not (luks_enabled | default(false))

    - name: Reboot the LUKS system
      command: systemctl reboot --job-mode=replace-irreversibly
      async: 1
      poll: 0
      failed_when: false
      when:
        - reboot_required_marker.stat.exists
        - luks_enabled | default(false)

    - name: Wait for initramfs dropbear on LUKS node
      delegate_to: localhost
      become: false
      wait_for:
        host: "{{ ansible_host | default(inventory_hostname, true) }}"
        port: "{{ luks_dropbear_port }}"
        delay: 5
        timeout: 600
      when:
        - reboot_required_marker.stat.exists
        - luks_enabled | default(false)

    - name: Unlock LUKS node through initramfs passfifo
      delegate_to: localhost
      become: false
      command: make LUKS_UNLOCK_PORT={{ luks_dropbear_port | string }} unlock {{ node_name }}
      args:
        chdir: "{{ inventory_dir }}/.."
      register: luks_unlock_result
      retries: 3
      delay: 10
      until: luks_unlock_result.rc == 0
      no_log: true
      when:
        - reboot_required_marker.stat.exists
        - luks_enabled | default(false)

    - name: Wait for system to become reachable
      delegate_to: localhost
      become: false
      wait_for:
        host: "{{ ansible_host | default(inventory_hostname, true) }}"
        port: 22
        delay: 10
        timeout: 600
      when: reboot_required_marker.stat.exists

    - name: Wait for SSH connection to recover
      wait_for_connection:
        delay: 5
        timeout: 300
      when: reboot_required_marker.stat.exists

    - name: Uncordon the node
      delegate_to: localhost
      become: false
      shell: KUBECONFIG="${KUBECONFIG:-$HOME/.kube/config}" kubectl uncordon {{ node_name }}
      changed_when: false
      when: reboot_required_marker.stat.exists

    - name: Restore node external load balancer candidacy
      delegate_to: localhost
      become: false
      shell: KUBECONFIG="${KUBECONFIG:-$HOME/.kube/config}" kubectl label node {{ node_name }} node.kubernetes.io/exclude-from-external-load-balancers-
      changed_when: false
      when: reboot_required_marker.stat.exists
