---
- hosts: localhost
  connection: local

  tasks:

    # Gateway API CRDs

    - name: Update dependency
      shell: "bash ../../../helm-charts/gateway-api/hack/download-crds.sh"
      register: gateway_api_dep_result
      retries: 3
      delay: 10
      until: gateway_api_dep_result.rc == 0
      changed_when: false

    - name: Apply gateway-api Helm template
      shell: "helm template gateway-api ../../../helm-charts/gateway-api -n kube-system --include-crds | kubectl apply --server-side -f -"
      register: gateway_api_result
      retries: 5
      delay: 10
      until: gateway_api_result.rc == 0

    # Apply MetalLB before configuring LoadBalancer IP allocations.

    - name: Ensure MetalLB Helm repository is configured locally
      command: helm repo add metallb https://metallb.github.io/metallb --force-update
      register: metallb_repo_result
      retries: 3
      delay: 10
      until: metallb_repo_result.rc == 0
      changed_when: false

    - name: Update MetalLB dependency
      command: helm dependency build --skip-refresh ../../../helm-charts/metallb
      register: metallb_dep_result
      retries: 3
      delay: 10
      until: metallb_dep_result.rc == 0
      changed_when: false

    - name: Apply MetalLB Helm template
      shell: "helm template metallb ../../../helm-charts/metallb -n metallb-system | kubectl apply -f -"
      register: metallb_result
      retries: 5
      delay: 10
      until: metallb_result.rc == 0

    - name: Wait for MetalLB controller to rollout
      shell: "kubectl rollout status deployment/metallb-controller -n metallb-system --timeout=15m"
      register: metallb_controller_result
      retries: 5
      delay: 10
      until: metallb_controller_result.rc == 0

    - name: Wait for MetalLB speaker to rollout
      shell: "kubectl rollout status daemonset/metallb-speaker -n metallb-system --timeout=15m"
      register: metallb_speaker_result
      retries: 5
      delay: 10
      until: metallb_speaker_result.rc == 0

    # Deploy k3s-apiserver-loadbalancer to watch and update the Kubernetes service to LoadBalancer type

    - name: Update dependency
      shell: "bash ../../../helm-charts/k3s-apiserver-loadbalancer/hack/create-manifest.sh"
      register: k3s_lb_dep_result
      retries: 3
      delay: 10
      until: k3s_lb_dep_result.rc == 0
      changed_when: false

    - name: Apply k3s-apiserver-loadbalancer Helm template
      shell: "helm template k3s-apiserver-loadbalancer ../../../helm-charts/k3s-apiserver-loadbalancer -n k3s-apiserver-loadbalancer-system | kubectl apply -f -"
      register: k3s_lb_result
      retries: 5
      delay: 10
      until: k3s_lb_result.rc == 0

    - name: Wait for k3s-apiserver-loadbalancer to rollout
      shell: "kubectl rollout status deploy/k3s-apiserver-loadbalancer-controller-manager -n k3s-apiserver-loadbalancer-system --timeout=15m"
      register: k3s_lb_rollout_result
      retries: 5
      delay: 10
      until: k3s_lb_rollout_result.rc == 0

    # Assign dedicated virtual IP to Kubernetes api-server service

    - name: Apply gateway-api-kubernetes Helm template
      shell: "helm template gateway-api-kubernetes ../../../helm-charts/gateway-api-kubernetes -n default | kubectl apply -f -"
      register: gateway_api_k8s_result
      retries: 5
      delay: 10
      until: gateway_api_k8s_result.rc == 0

    - name: Update Envoy Gateway dependency
      command: helm dependency build --skip-refresh ../../../helm-charts/envoy-gateway
      register: envoy_gateway_dep_result
      retries: 3
      delay: 10
      until: envoy_gateway_dep_result.rc == 0
      changed_when: false

    - name: Find Envoy Gateway dependency archive
      find:
        paths: ../../../helm-charts/envoy-gateway/charts
        patterns: gateway-helm-*.tgz
        file_type: file
      register: envoy_gateway_chart_archive

    - name: Apply Envoy Gateway CRDs
      shell: |
        chart_archive="{{ envoy_gateway_chart_archive.files | map(attribute='path') | first }}"
        tar -tzf "$chart_archive" | \
          grep '^gateway-helm/crds/generated/gateway\.envoyproxy\.io_.*\.yaml$' | \
          xargs tar -xOf "$chart_archive" | \
          kubectl apply --server-side --force-conflicts -f -
      register: envoy_gateway_crds_result
      retries: 5
      delay: 10
      until: envoy_gateway_crds_result.rc == 0

    - name: Apply Envoy Gateway Helm template
      shell: |
        helm template envoy-gateway ../../../helm-charts/envoy-gateway -n gateway-api \
          --set bootstrap.enabled=true \
          --set tls.secretName=envoy \
          --api-versions='gateway.networking.k8s.io/v1/GatewayClass' | kubectl apply -f -
      register: envoy_gateway_result
      retries: 5
      delay: 10
      until: envoy_gateway_result.rc == 0

    - name: Wait for Envoy Gateway to rollout
      shell: "kubectl rollout status deploy/envoy-gateway -n gateway-api --timeout=15m"
      register: envoy_gateway_rollout_result
      retries: 5
      delay: 10
      until: envoy_gateway_rollout_result.rc == 0
