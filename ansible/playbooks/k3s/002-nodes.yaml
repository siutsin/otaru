---
- hosts: raspberrypi
  become: true
  gather_facts: true
  vars:
    LB_API_SERVER_IP: 192.168.10.50
    K3S_CHANNEL: stable

  tasks:
    - name: Get node token from master
      shell: sudo cat /var/lib/rancher/k3s/server/node-token
      register: master_token
      run_once: true
      delegate_to: "{{ groups['master'][0] }}"
      retries: 5
      delay: 10
      no_log: true

    - name: Share node token with subsequent tasks
      set_fact:
        k3s_master_token: "{{ master_token.stdout }}"
      delegate_to: localhost
      delegate_facts: true
      run_once: true
      no_log: true

    - name: Install k3s on master nodes with LB_API_SERVER_IP
      # Enable anonymous authentication
      # https://stackoverflow.com/questions/74603633/k3s-allow-unauthenticated-access-to-oidc-endpoints
      # All API server arguments need to be passed using the `kube-apiserver-arg` flag
      # https://docs.k3s.io/cli/server#customized-flags-for-kubernetes-processes
      # https://kubernetes.io/docs/reference/command-line-tools-reference/kube-apiserver/
      # https://github.com/aws/amazon-eks-pod-identity-webhook/blob/master/SELF_HOSTED_SETUP.md
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_CHANNEL={{ K3S_CHANNEL }} INSTALL_K3S_SKIP_DOWNLOAD=false sh -s - \
          --token {{ hostvars['localhost']['k3s_master_token'] }} \
          --server https://{{ hostvars[groups['master'][0]]['ansible_host'] }}:6443 \
          --disable coredns \
          --disable metrics-server \
          --disable servicelb \
          --disable traefik \
          --disable-network-policy \
          --flannel-backend=wireguard-native \
          --secrets-encryption \
          --tls-san {{ LB_API_SERVER_IP }} \
          --tls-san {{ ansible_host }} \
          --write-kubeconfig-mode=644 \
          --kube-apiserver-arg \
          --anonymous-auth=true \
          --kube-apiserver-arg \
          --service-account-issuer=https://oidc.siutsin.com \
          --kube-apiserver-arg \
          --api-audiences=oidc.siutsin.com \
          --kube-apiserver-arg \
          --service-account-jwks-uri=https://oidc.siutsin.com/openid/v1/jwks
      retries: 5
      delay: 10
      when:
        - "'master' in group_names"
        - inventory_hostname != groups['master'][0]

    - name: Check if serving cert contains required TLS SANs
      shell: |
        cert=/var/lib/rancher/k3s/server/tls/serving-kube-apiserver.crt
        [ -f "$cert" ] || exit 1
        sans=$(openssl x509 -in "$cert" -noout -ext subjectAltName 2>/dev/null)
        echo "$sans" | grep -q "{{ LB_API_SERVER_IP }}" && \
        echo "$sans" | grep -q "{{ ansible_host }}"
      register: san_check
      changed_when: false
      failed_when: false
      when: "'master' in group_names"

    - name: Remove serving cert to force regeneration with updated TLS SANs
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/lib/rancher/k3s/server/tls/serving-kube-apiserver.crt
        - /var/lib/rancher/k3s/server/tls/serving-kube-apiserver.key
      when:
        - "'master' in group_names"
        - san_check.rc != 0
      notify: Restart k3s

    - name: Change ownership of k3s.yaml to pi:pi
      file:
        path: /etc/rancher/k3s/k3s.yaml
        owner: pi
        group: pi
        state: file
      retries: 5
      delay: 10
      when: "'master' in group_names"

    - name: Install k3s on workers
      shell: |
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_CHANNEL={{ K3S_CHANNEL }} \
          INSTALL_K3S_SKIP_DOWNLOAD=false \
          K3S_TOKEN={{ hostvars['localhost']['k3s_master_token'] }} \
          K3S_URL=https://{{ LB_API_SERVER_IP }}:443 \
          sh -
      retries: 5
      delay: 10
      when: "'worker' in group_names"

    - name: Ensure k3s CNI plugin path resolves istio-cni binary
      file:
        src: /opt/cni/bin/istio-cni
        dest: /var/lib/rancher/k3s/data/cni/istio-cni
        state: link
        force: true

  handlers:
    - name: Restart k3s
      systemd:
        name: k3s
        state: restarted
