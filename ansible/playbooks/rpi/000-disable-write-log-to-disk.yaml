---
- hosts: raspberrypi
  become: yes
  gather_facts: true

  # Configure journald to limit log size and reduce unnecessary disk writes.
  # SD card nodes use volatile (RAM) storage to extend card lifespan.
  # NVMe boot nodes use persistent storage but cap log size to 100M.
  tasks:
    - name: Set journald to volatile storage (SD card nodes)
      lineinfile:
        path: /etc/systemd/journald.conf
        regexp: '^#?Storage='
        line: 'Storage=volatile'
      when: ansible_mounts | selectattr('mount', 'equalto', '/') | map(attribute='device') | first is match('^/dev/mmcblk')
      notify: &notify
        - Restart journald
        - Clear all logs in /var/log

    - name: Set journald to persistent storage (NVMe boot nodes)
      lineinfile:
        path: /etc/systemd/journald.conf
        regexp: '^#?Storage='
        line: 'Storage=persistent'
      when: ansible_mounts | selectattr('mount', 'equalto', '/') | map(attribute='device') | first is not match('^/dev/mmcblk')
      notify: *notify

    - name: Set journald max log size
      lineinfile:
        path: /etc/systemd/journald.conf
        regexp: '^#?{{ item.key }}='
        line: '{{ item.key }}={{ item.value }}'
      loop:
        - { key: RuntimeMaxUse, value: 100M }
        - { key: SystemMaxUse, value: 100M }
      notify: *notify

    - name: Disable rsyslog service
      systemd:
        name: rsyslog
        enabled: false
        state: stopped

    - name: Clear all logs in /var/log
      command: find /var/log -type f -exec truncate -s 0 {} +
      changed_when: false

  handlers:
    - name: Restart journald
      systemd:
        name: systemd-journald
        state: restarted

    - name: Clear all logs in /var/log
      command: find /var/log -type f -exec truncate -s 0 {} +
