---
- hosts: raspberrypi
  become: true
  gather_facts: true
  vars:
    rpi_netplan_file: /etc/netplan/50-cloud-init.yaml
    rpi_netplan_work_file: /home/pi/50-cloud-init.yaml
    rpi_eth0_address: "{{ ansible_host }}/24"
    rpi_gateway: 192.168.10.1
    rpi_subnet: 192.168.10.0/24
    rpi_pod_cidr: 10.42.0.0/16
    rpi_service_cidr: 10.43.0.0/16

  tasks:
    # https://metallb.universe.tf/troubleshooting/#using-wifi-and-cant-reach-the-service
    - name: Check if promisc-mode service exists
      stat:
        path: /etc/systemd/system/promisc-mode.service
      register: promisc_mode_service

    - name: Create systemd service to enable promiscuous mode for eth0
      copy:
        dest: /etc/systemd/system/promisc-mode.service
        content: |
          [Unit]
          Description=Enable promiscuous mode for eth0
          After=network.target

          [Service]
          Type=oneshot
          ExecStart=/sbin/ifconfig eth0 promisc

          [Install]
          WantedBy=multi-user.target
        owner: root
        group: root
        mode: '0644'
      when: not promisc_mode_service.stat.exists
      notify:
        - Reload systemd and start promisc-mode service

    # workarounds for permissions issues with /etc/netplan/50-cloud-init.yaml
    # for some reason, even sudo doesn't work, so we have to copy the file to the home directory,
    # set the permissions, modify the file, and then move it back
    - name: Copy netplan config to home directory
      command: cp "{{ rpi_netplan_file }}" "{{ rpi_netplan_work_file }}"
      become: true
      changed_when: false

    - name: Change ownership of the copied netplan file to the user pi
      command: chown pi:pi "{{ rpi_netplan_work_file }}"
      become: true
      changed_when: false

    - name: Configure eth0 netplan settings using yq
      command: |
        /snap/bin/yq -i '
          del(.network.ethernets.eth0.gateway4) |
          (.network.ethernets.eth0.dhcp4) = false |
          (.network.ethernets.eth0.addresses) = ["{{ rpi_eth0_address }}"] |
          (.network.ethernets.eth0.routes) = [
            {"to": "0.0.0.0/0", "via": "{{ rpi_gateway }}", "metric": 100},
            {"to": "0.0.0.0/0", "via": "{{ rpi_gateway }}", "table": 100},
            {"to": "{{ rpi_subnet }}", "scope": "link", "table": 100}
          ] |
          (.network.ethernets.eth0."routing-policy") = [
            {"to": "{{ rpi_pod_cidr }}", "table": 254, "priority": 50},
            {"to": "{{ rpi_service_cidr }}", "table": 254, "priority": 51},
            {"from": "{{ ansible_host }}/32", "table": 100, "priority": 100}
          ] |
          (.network.ethernets.eth0.nameservers.addresses) = ["{{ rpi_gateway }}"]
        ' "{{ rpi_netplan_work_file }}"
      become: false  # Run this as pi, since the file is owned by pi
      changed_when: false

    - name: Check if the modified netplan file is different from the original
      shell: diff "{{ rpi_netplan_work_file }}" "{{ rpi_netplan_file }}"
      register: netplan_diff
      ignore_errors: true
      changed_when: netplan_diff.rc == 1
      failed_when: netplan_diff.rc not in [0, 1]

    - name: Change ownership of the modified netplan file back to root
      command: chown root:root "{{ rpi_netplan_work_file }}"
      become: true
      when: netplan_diff.stdout != ""

    - name: Move the modified netplan file back to /etc/netplan
      command: mv "{{ rpi_netplan_work_file }}" "{{ rpi_netplan_file }}"
      become: true
      when: netplan_diff.stdout != ""
      notify:
        - Apply netplan configuration

    - name: Clean up temporary netplan file if no changes
      file:
        path: "{{ rpi_netplan_work_file }}"
        state: absent
      when: netplan_diff.stdout == ""
      changed_when: false

  handlers:
    - name: Reload systemd and start promisc-mode service
      systemd:
        name: promisc-mode.service
        enabled: true
        state: started
        daemon_reload: yes

    - name: Apply netplan configuration
      # Run asynchronously because netplan may briefly disrupt the SSH session.
      command: netplan apply
      become: true
      async: 120
      poll: 0
      notify: Wait for system to become reachable

    - name: Wait for system to become reachable
      wait_for:
        host: "{{ ansible_host }}"
        port: 22
        delay: 3
        timeout: 600

    - name: Reconnect with new static IP
      meta: reset_connection
