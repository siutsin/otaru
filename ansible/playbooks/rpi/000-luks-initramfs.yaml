---
- hosts: luks_root_nodes
  become: true

  vars:
    luks_initramfs_conf: /etc/initramfs-tools/initramfs.conf
    luks_dropbear_conf: /etc/dropbear/initramfs/dropbear.conf
    luks_dropbear_authorized_keys_dest: /etc/dropbear/initramfs/authorized_keys
    luks_dropbear_idle_timeout: 180
    luks_dropbear_extra_options:
      - -j
      - -k
      - -s
    luks_required_vars:
      - luks_root_disk
      - luks_boot_partition
      - luks_root_partition
      - luks_mapper_name
      - luks_initramfs_iface
      - luks_initramfs_gateway
      - luks_initramfs_netmask
      - luks_initramfs_dns
      - luks_dropbear_port
      - luks_unlock_authorized_keys_src
    luks_initramfs_ip_effective: "{{ luks_initramfs_ip | default(ansible_host | default(inventory_hostname, true), true) }}"
    luks_initramfs_ip_line: >-
      {{ luks_initramfs_ip_effective }}::{{ luks_initramfs_gateway }}:{{ luks_initramfs_netmask }}:{{
      inventory_hostname_short }}:{{ luks_initramfs_iface }}:off:{{ luks_initramfs_dns }}
    luks_dropbear_options_line: >-
      -I {{ luks_dropbear_idle_timeout }} -p {{ luks_dropbear_port }} {{
      luks_dropbear_extra_options | join(' ') }}

  tasks:
    - name: Assert required LUKS inventory vars are present
      assert:
        that:
          - lookup('vars', item, default='') | string | length > 0
        fail_msg: "Missing required LUKS variable: {{ item }}"
      loop: "{{ luks_required_vars }}"

    - name: Install LUKS initramfs packages
      apt:
        name:
          - cryptsetup
          - dropbear-initramfs
          - initramfs-tools
        state: present

    - name: Enable dropbear in initramfs
      lineinfile:
        path: "{{ luks_initramfs_conf }}"
        regexp: '^DROPBEAR=.*'
        line: 'DROPBEAR=y'
        state: present
      notify: Update initramfs

    - name: Configure static initramfs networking
      lineinfile:
        path: "{{ luks_initramfs_conf }}"
        regexp: '^IP=.*'
        # ip=<client-ip>:<server-ip>:<gw-ip>:<netmask>:<hostname>:<device>:<autoconf>:<dns0-ip>:<dns1-ip>
        line: "IP={{ luks_initramfs_ip_line }}"
        state: present
      notify: Update initramfs

    - name: Configure dropbear initramfs shell access
      lineinfile:
        path: "{{ luks_dropbear_conf }}"
        regexp: '^DROPBEAR_OPTIONS=.*'
        line: 'DROPBEAR_OPTIONS="{{ luks_dropbear_options_line }}"'
        state: present
      notify: Update initramfs

    - name: Install initramfs unlock authorized keys
      copy:
        src: "{{ luks_unlock_authorized_keys_src }}"
        dest: "{{ luks_dropbear_authorized_keys_dest }}"
        owner: root
        group: root
        mode: '0600'
        remote_src: true
      notify: Update initramfs

  handlers:
    - name: Update initramfs
      command: update-initramfs -u -k all
