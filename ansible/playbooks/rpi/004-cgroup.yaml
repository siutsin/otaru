---
- hosts: raspberrypi
  become: true
  vars:
    append_text: "cgroup_enable=cpuset cgroup_enable=memory cgroup_memory=1"

  tasks:
    - name: Get content of /boot/firmware/cmdline.txt
      slurp:
        src: /boot/firmware/cmdline.txt
      register: slurp_cmdline

    - name: Decode the content
      set_fact:
        cmdline_decoded: "{{ slurp_cmdline['content'] | b64decode }}"
      changed_when: False

    - name: Append and update /boot/firmware/cmdline.txt if text is not present
      lineinfile:
        path: /boot/firmware/cmdline.txt
        backrefs: yes
        regexp: '(.*)'
        line: '\1 {{ append_text }}'
      when: append_text not in cmdline_decoded
      register: update_cmdline

    - name: Reboot the system if cmdline.txt is updated
      reboot:
        reboot_command: systemctl reboot --job-mode=replace-irreversibly
      when:
        - update_cmdline is changed
        - not (luks_enabled | default(false))

    - name: Reboot the LUKS system if cmdline.txt is updated
      command: systemctl reboot --job-mode=replace-irreversibly
      async: 1
      poll: 0
      failed_when: false
      when:
        - update_cmdline is changed
        - luks_enabled | default(false)

    - name: Wait for initramfs dropbear on LUKS node
      delegate_to: localhost
      become: false
      wait_for:
        host: "{{ ansible_host | default(inventory_hostname, true) }}"
        port: "{{ luks_dropbear_port }}"
        delay: 5
        timeout: 600
      when:
        - update_cmdline is changed
        - luks_enabled | default(false)

    - name: Unlock LUKS node through initramfs passfifo
      delegate_to: localhost
      become: false
      command:
        argv:
          - ./hack/luks-cryptroot-unlock.sh
          - "{{ ansible_host | default(inventory_hostname, true) }}"
          - "{{ luks_dropbear_port | string }}"
          - --vault-passfifo
      when:
        - update_cmdline is changed
        - luks_enabled | default(false)

    - name: Wait for system to become reachable again
      delegate_to: localhost
      become: false
      wait_for:
        host: "{{ ansible_host | default(inventory_hostname, true) }}"
        port: 22
        delay: 10
        timeout: 600
      when: update_cmdline is changed

    - name: Wait for SSH connection to recover again
      wait_for_connection:
        delay: 5
        timeout: 300
      when: update_cmdline is changed
