- name: Wait for SSH port to become reachable
  delegate_to: localhost
  become: false
  wait_for:
    host: "{{ ansible_host | default(inventory_hostname, true) }}"
    port: 22
    delay: 3
    timeout: 600
  changed_when: false

- name: Ensure local SSH known_hosts file exists
  delegate_to: localhost
  become: false
  copy:
    dest: "{{ lookup('ansible.builtin.env', 'HOME') }}/.ssh/known_hosts"
    content: ""
    force: false
    mode: "0600"

- name: Add current SSH host key to local known_hosts
  delegate_to: localhost
  become: false
  throttle: 1
  known_hosts:
    path: "{{ lookup('ansible.builtin.env', 'HOME') }}/.ssh/known_hosts"
    name: "{{ ansible_host | default(inventory_hostname, true) }}"
    key: "{{ lookup('ansible.builtin.pipe', 'ssh-keyscan -T 5 -t ed25519 ' ~ (ansible_host | default(inventory_hostname, true) | quote) ~ ' 2>/dev/null | grep \" ssh-ed25519 \" | head -n 1') }}"
    state: present

- name: Wait for SSH connection to become usable
  wait_for_connection:
    delay: 1
    timeout: 300
  changed_when: false
