- name: Wait for SSH port to become reachable
  delegate_to: localhost
  become: false
  wait_for:
    host: "{{ ansible_host | default(inventory_hostname, true) }}"
    port: 22
    delay: 3
    timeout: 600
  changed_when: false

- name: Ensure local SSH known_hosts file exists
  delegate_to: localhost
  become: false
  copy:
    dest: "{{ lookup('ansible.builtin.env', 'HOME') }}/.ssh/known_hosts"
    content: ""
    force: false
    mode: "0600"

- name: Scan current SSH host key
  delegate_to: localhost
  become: false
  command: ssh-keyscan -T 5 -t ed25519 {{ ansible_host | default(inventory_hostname, true) }}
  register: ssh_host_keyscan
  changed_when: false
  failed_when: >-
    ssh_host_keyscan.rc != 0 or
    (ssh_host_keyscan.stdout_lines | select('search', ' ssh-ed25519 ') | list | length) == 0

- name: Share current SSH host key
  set_fact:
    current_ssh_host_key: "{{ ssh_host_keyscan.stdout_lines | select('search', ' ssh-ed25519 ') | first }}"

- name: Check for stale SSH host keys
  delegate_to: localhost
  become: false
  shell: |
    set -o pipefail
    ssh-keygen -F {{ ansible_host | default(inventory_hostname, true) | quote }} -f {{ (lookup('ansible.builtin.env', 'HOME') ~ '/.ssh/known_hosts') | quote }} 2>/dev/null \
      | awk '!/^#/ { print }' \
      | grep -Fvx -- {{ current_ssh_host_key | quote }} >/dev/null
  args:
    executable: /bin/bash
  register: stale_ssh_host_keys
  changed_when: false
  failed_when: false

- name: Remove stale SSH host keys
  delegate_to: localhost
  become: false
  throttle: 1
  command: ssh-keygen -R {{ ansible_host | default(inventory_hostname, true) }} -f {{ lookup('ansible.builtin.env', 'HOME') }}/.ssh/known_hosts
  when: stale_ssh_host_keys.rc == 0

- name: Add current SSH host key to local known_hosts
  delegate_to: localhost
  become: false
  throttle: 1
  known_hosts:
    path: "{{ lookup('ansible.builtin.env', 'HOME') }}/.ssh/known_hosts"
    name: "{{ ansible_host | default(inventory_hostname, true) }}"
    key: "{{ current_ssh_host_key }}"
    state: present

- name: Wait for SSH connection to become usable
  wait_for_connection:
    delay: 1
    timeout: 300
  changed_when: false
