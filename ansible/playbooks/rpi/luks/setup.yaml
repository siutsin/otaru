---
- name: Resolve target inventory host
  set_fact:
    luks_target_inventory_host: "{{ target_node if target_node in hostvars else (target_node ~ '.local' if (target_node ~ '.local') in hostvars else '') }}"

- name: Assert FDE init inputs are present
  assert:
    that:
      - target_node | length > 0
      - luks_target_inventory_host | length > 0
      - expected_disk_model_substring | length > 0
      - hostvars[luks_target_inventory_host].ansible_host is defined
    fail_msg: >-
      Set target_node to a valid inventory host and expected_disk_model_substring to a stable NVMe
      model substring before running the LUKS init playbook.

- name: Derive target node facts
  set_fact:
    luks_target_hostname: "{{ luks_target_inventory_host | regex_replace('\\.local$', '') }}"
    luks_target_ip: "{{ hostvars[luks_target_inventory_host].ansible_host }}"
    luks_target_gateway: "{{ hostvars[luks_target_inventory_host].luks_initramfs_gateway | default('192.168.10.1', true) }}"
    luks_target_netmask: "{{ hostvars[luks_target_inventory_host].luks_initramfs_netmask | default('255.255.255.0', true) }}"
    luks_target_dns: "{{ hostvars[luks_target_inventory_host].luks_initramfs_dns | default('192.168.10.1', true) }}"
    luks_target_dropbear_port: "{{ hostvars[luks_target_inventory_host].luks_dropbear_port | default('1024', true) }}"

- name: Assert a LUKS password source is configured
  assert:
    that:
      - luks_password_file | length > 0 or (lookup('ansible.builtin.env', 'OTARU_LUKS_PASSWORD') | length > 0)
    fail_msg: Set LUKS_PASSWORD_FILE or OTARU_LUKS_PASSWORD before running FDE init.

- name: Load LUKS password from file
  set_fact:
    luks_password_value: "{{ lookup('ansible.builtin.file', luks_password_file, rstrip=False) }}"
  when: luks_password_file | length > 0
  no_log: true

- name: Load LUKS password from environment
  set_fact:
    luks_password_value: "{{ lookup('ansible.builtin.env', 'OTARU_LUKS_PASSWORD') }}"
  when: luks_password_file | length == 0
  no_log: true

- name: Register rescue host for delegated tasks
  add_host:
    name: luks_rescue_runtime
    ansible_host: "{{ luks_rescue_host }}"
    ansible_user: "{{ luks_rescue_user }}"
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

- name: Prompt to insert rescue SD card and boot target
  pause:
    prompt: |-
      Insert the rescue SD card into {{ luks_target_hostname }}, power it on, and wait for rescue SSH
      on {{ luks_rescue_host }}. Press Enter when that is done.

- name: Wait for rescue SSH to become reachable
  wait_for:
    host: "{{ luks_rescue_host }}"
    port: 22
    delay: 2
    timeout: 600

- name: Rebuild target disk into clean encrypted-root state on rescue host
  ansible.builtin.command: "{{ otaru_repo_root }}/hack/luks-node-init.sh"
  environment:
    RESCUE_HOST: "{{ luks_rescue_user }}@{{ luks_rescue_host }}"
    REMOTE_IMAGE_PATH: "{{ luks_remote_image_path }}"
    TARGET_DISK: "{{ luks_target_disk }}"
    TARGET_HOSTNAME: "{{ luks_target_hostname }}"
    TARGET_IP: "{{ luks_target_ip }}"
    TARGET_GATEWAY: "{{ luks_target_gateway }}"
    TARGET_NETMASK: "{{ luks_target_netmask }}"
    TARGET_DNS: "{{ luks_target_dns }}"
    DROPBEAR_PORT: "{{ luks_target_dropbear_port | string }}"
    EXPECTED_DISK_MODEL_SUBSTRING: "{{ expected_disk_model_substring }}"
    MINIMUM_DISK_SIZE_BYTES: "{{ luks_minimum_disk_size_bytes | string }}"
    LUKS_NODE_INIT_CONFIRM: "yes"
    LUKS_PASSWORD_FILE: "{{ luks_password_file }}"
    OTARU_LUKS_PASSWORD: "{{ luks_password_value | default('', true) }}"
  no_log: true

- name: Power off rescue host after rebuild
  shell: nohup bash -c 'sleep 2; systemctl poweroff' >/dev/null 2>&1 &
  args:
    executable: /bin/bash
  delegate_to: luks_rescue_runtime
  become: true
  async: 5
  poll: 0
  changed_when: true

- name: Prompt to remove rescue SD card and boot from NVMe
  pause:
    prompt: |-
      Remove the rescue SD card from {{ luks_target_hostname }}, boot from NVMe, and press Enter when
      that is done.
